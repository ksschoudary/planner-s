<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Planner S"/>
<meta name="theme-color" content="#100b07"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg" type="image/svg+xml"/>
<title>Planner S</title>
<style>
/* ─── FONTS (with system fallback so layout never breaks) ─── */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');

/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none}

/* ─── DESIGN TOKENS ─── */
:root{
  /* colours */
  --bg:       #100b07;
  --bg1:      #1a110b;
  --bg2:      #231710;
  --bg3:      #2c1e13;
  --sur:      rgba(255,255,255,.055);
  --sur2:     rgba(255,255,255,.09);
  --bdr:      rgba(255,255,255,.10);
  --bdr2:     rgba(255,255,255,.17);
  --tx:       #f5ede6;
  --tx2:      rgba(245,237,230,.60);
  --tx3:      rgba(245,237,230,.32);
  --ac:       #e8633a;
  --ac2:      rgba(232,99,58,.18);
  --ac3:      rgba(232,99,58,.30);
  --grn:      #5bba8f;
  --yel:      #d4aa5b;
  --red:      #d45b5b;
  /* radii */
  --r:        14px;
  --rsm:      10px;
  --rxs:       7px;
  /* fonts */
  --ff: 'Playfair Display', Georgia, 'Times New Roman', serif;
  --fb: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  /* safe areas */
  --sat: env(safe-area-inset-top,    0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left,   0px);
  --sar: env(safe-area-inset-right,  0px);
  /* fixed chrome heights (px values used in JS too) */
  --hdr:  86px;   /* header */
  --tkr:  28px;   /* ticker */
  --flt:  42px;   /* filter row */
  --nav:  54px;   /* nav bar (above safe area) */
}

/* ─── BASE ─── */
html{ height: 100%; overflow: hidden; }
body{
  height: 100%; overflow: hidden;
  font-family: var(--fb);
  font-size: 14px;
  line-height: 1.4;
  color: var(--tx);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 120% 55% at 50% -5%, rgba(232,99,58,.18) 0%, transparent 65%),
    radial-gradient(ellipse 60%  40% at 95% 85%, rgba(91,143,212,.07) 0%, transparent 55%);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ─── APP SHELL: fills viewport, column flex ─── */
#app{
  position: fixed;
  top: 0; left: var(--sal); right: var(--sar); bottom: 0;
  padding-top: var(--sat);
  padding-bottom: var(--sab);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ════════════════════════════════════
   HEADER  (compact, fixed height)
════════════════════════════════════ */
.hdr{
  flex: 0 0 var(--hdr);
  height: var(--hdr);
  padding: 10px 16px 8px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.hdr-row1{ display:flex; align-items:center; justify-content:space-between; }
.clock-pill{
  display: flex; align-items: center; gap: 7px;
  background: var(--sur); border: 1px solid var(--bdr);
  border-radius: 20px; padding: 4px 12px 4px 8px;
}
.dot{
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ac);
  animation: dotpulse 2s infinite;
  flex-shrink: 0;
}
@keyframes dotpulse{
  0%,100%{ box-shadow: 0 0 0 0 rgba(232,99,58,.55); }
  50%    { box-shadow: 0 0 0 5px rgba(232,99,58,0); }
}
.clock-time{ font-family: var(--fb); font-size: 14px; font-weight: 700; letter-spacing: .5px; }
.clock-sep{ color: var(--tx3); font-size: 11px; }
.clock-date{ font-size: 11px; color: var(--tx2); }
.add-btn{
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--ac); border: none; color: #fff;
  font-size: 26px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(232,99,58,.45);
  transition: transform .12s, box-shadow .12s;
}
.add-btn:active{ transform: scale(.88); box-shadow: 0 2px 8px rgba(232,99,58,.3); }
.hdr-row2{ display:flex; align-items:baseline; gap:10px; }
.app-title{ font-family: var(--ff); font-size: 28px; font-weight: 900; letter-spacing: -.5px; color: var(--tx); line-height: 1; }
.app-sub{ font-size: 11px; color: var(--tx3); font-weight: 400; }

/* ════════════════════════════════════
   TICKER
════════════════════════════════════ */
.tkr{
  flex: 0 0 var(--tkr);
  height: var(--tkr);
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px;
  background: rgba(232,99,58,.07);
  border-top: 1px solid rgba(232,99,58,.12);
  border-bottom: 1px solid rgba(232,99,58,.12);
  overflow: hidden;
}
.tkr-lbl{
  font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--ac); background: var(--ac2); border-radius: 4px;
  padding: 2px 6px; white-space: nowrap; flex-shrink: 0;
}
.tkr-track{ flex: 1; overflow: hidden; position: relative; }
.tkr-text{
  display: inline-block; white-space: nowrap;
  font-size: 11px; color: var(--tx2);
  padding-left: 100%;
  animation: scroll-left 28s linear infinite;
}
@keyframes scroll-left{ from{ transform:translateX(0) } to{ transform:translateX(-100%) } }

/* ════════════════════════════════════
   FILTER CHIPS
════════════════════════════════════ */
.flt{
  flex: 0 0 var(--flt);
  height: var(--flt);
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px;
  overflow-x: auto; scroll-snap-type: x mandatory;
  scrollbar-width: none;
}
.flt::-webkit-scrollbar{ display:none }
.chip{
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--bdr);
  background: transparent; color: var(--tx2);
  font-family: var(--fb); font-size: 11.5px; font-weight: 500;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all .18s;
  scroll-snap-align: start;
}
.chip.on{
  background: var(--ac); border-color: var(--ac); color: #fff; font-weight: 600;
  box-shadow: 0 2px 10px rgba(232,99,58,.4);
}
.ccount{
  background: rgba(0,0,0,.25); border-radius: 8px;
  padding: 1px 5px; font-size: 9.5px; font-weight: 700; min-width: 16px; text-align: center;
}
.chip:not(.on) .ccount{ background: var(--sur2); }

/* ════════════════════════════════════
   MAIN  (fills remaining space)
════════════════════════════════════ */
main{
  flex: 1 1 0;
  min-height: 0;
  overflow: hidden;
  position: relative;
}
.tab{
  position: absolute; inset: 0;
  display: none; flex-direction: column;
  overflow: hidden;
}
.tab.on{ display: flex; }

/* ════════════════════════════════════
   CALENDAR TAB
════════════════════════════════════ */
.cal-wrap{
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  padding: 6px 10px 0;
  gap: 6px;
  overflow: hidden;
}

/* Calendar card */
.cal-card{
  flex: 0 0 auto;
  background: var(--sur); border: 1px solid var(--bdr);
  border-radius: var(--r); overflow: hidden;
  /* JS sets height; contain prevents children from inflating it */
  contain: size layout;
}
.cal-card-hdr{
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 6px;
}
.cal-month{ font-family: var(--ff); font-size: 18px; font-weight: 700; color: var(--tx); }
.cal-nav{ display:flex; align-items:center; gap:5px; }
.today-btn{
  font-size: 10px; font-weight: 600; color: var(--ac);
  background: var(--ac2); border: 1px solid var(--ac3); border-radius: 14px;
  padding: 3px 9px; cursor: pointer; line-height: 1.5;
}
.arr{
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--sur2); border: 1px solid var(--bdr);
  color: var(--tx2); font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
}
.arr:active{ background: var(--bdr2); }
.wdays{
  display: grid; grid-template-columns: repeat(7,1fr);
  padding: 0 6px 3px; gap: 2px;
}
.wdays span{
  text-align: center; font-size: 9px; font-weight: 600;
  letter-spacing: .8px; color: var(--tx3); text-transform: uppercase;
}

/* Calendar grid — height is set dynamically via JS */
.cal-grid{
  display: grid; grid-template-columns: repeat(7,1fr);
  /* grid-template-rows set by JS to lock equal row heights */
  gap: 2px; padding: 0 4px 6px;
}
.cday{
  border-radius: 5px; cursor: pointer;
  display: flex; flex-direction: column;
  align-items: stretch;
  /* NO padding — content manages its own spacing */
  transition: background .12s;
  overflow: hidden; /* CRITICAL: pills cannot push cell taller */
  /* Fill the explicit grid-row height 100% */
  min-height: 0;
}
.cday:active{ background: var(--sur2); }
.cday.oth{ opacity: .28; }
.cday.tod{ background: var(--ac2); }
.cday.sel{ background: rgba(232,99,58,.22); outline: 1.5px solid var(--ac3); outline-offset: -1px; }
.dnum{
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11.5px; font-weight: 500; color: var(--tx2);
  flex-shrink: 0; line-height: 1;
}
.cday.tod  .dnum{ background: var(--ac); color: #fff; font-weight: 700; }
.cday.sel:not(.tod) .dnum{ color: var(--ac); font-weight: 600; }
.dpills{
  width: 100%; display: flex; flex-direction: column;
  gap: 1px; overflow: hidden;
}
.dpill{
  width: 100%; font-size: 7.5px; font-weight: 600;
  padding: 1px 3px; border-radius: 3px;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  line-height: 1.4;
}
.dpmore{ font-size: 7px; color: var(--tx3); padding: 0 2px; line-height: 1.3; }

/* Day preview panel */
.day-prev{
  flex: 1; min-height: 0;
  background: var(--sur); border: 1px solid var(--bdr);
  border-radius: var(--r); display: flex; flex-direction: column;
  overflow: hidden; margin-bottom: 6px;
}
.dp-hdr{
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px 7px; border-bottom: 1px solid var(--bdr); flex-shrink: 0;
}
.dp-title{ font-size: 12px; font-weight: 600; color: var(--tx); }
.dp-add{
  font-size: 10.5px; color: var(--ac); font-weight: 600;
  background: var(--ac2); border: 1px solid var(--ac3);
  border-radius: 10px; padding: 3px 9px; cursor: pointer;
}
.dp-list{
  flex: 1; overflow-y: auto; padding: 5px 8px;
  display: flex; flex-direction: column; gap: 4px;
  scrollbar-width: none;
}
.dp-list::-webkit-scrollbar{ display:none }
.dp-item{
  display: flex; align-items: center; gap: 8px;
  padding: 6px 9px; border-radius: 8px;
  background: var(--sur2); border-left: 3px solid var(--ac);
  cursor: pointer; flex-shrink: 0;
}
.dp-time{ font-size: 9px; color: var(--tx3); min-width: 30px; font-weight: 500; }
.dp-name{ flex: 1; font-size: 11.5px; color: var(--tx); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.dp-acts{ display: flex; gap: 3px; flex-shrink: 0; }
.ibtn{
  width: 24px; height: 24px; border-radius: 6px;
  border: 1px solid var(--bdr); background: transparent;
  color: var(--tx3); font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s;
}
.ibtn:active{ background: var(--sur2); color: var(--tx); }
.ibtn.d:active{ border-color: var(--red); color: var(--red); }
.dp-empty{ text-align: center; padding: 14px; color: var(--tx3); font-size: 11px; font-style: italic; }

/* ════════════════════════════════════
   AGENDA / LIST TABS
════════════════════════════════════ */
.tab-title{
  font-family: var(--ff); font-size: 22px; font-weight: 700;
  padding: 10px 14px 6px; flex-shrink: 0; color: var(--tx);
}
.slist{
  flex: 1; overflow-y: auto; padding: 0 10px 8px;
  scrollbar-width: thin; scrollbar-color: var(--bdr) transparent;
}
.ag-group{ margin-bottom: 12px; }
.ag-lbl{
  font-size: 9.5px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--ac); padding: 0 2px 5px;
}
.ag-item{
  display: flex; align-items: center; gap: 9px;
  padding: 10px 11px; border-radius: var(--rsm);
  background: var(--sur); border: 1px solid var(--bdr);
  margin-bottom: 4px; cursor: pointer; transition: background .12s;
}
.ag-item:active{ background: var(--sur2); }
.ag-bar{ width: 3px; height: 32px; border-radius: 3px; flex-shrink: 0; }
.ag-info{ flex: 1; min-width: 0; }
.ag-ttl{ font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ag-met{ font-size: 10px; color: var(--tx3); display: flex; gap: 7px; margin-top: 2px; flex-wrap: wrap; }
.ag-acts{ display: flex; gap: 4px; flex-shrink: 0; }

/* ════════════════════════════════════
   NOTES GRID
════════════════════════════════════ */
.ngrid{
  flex: 1; overflow-y: auto; padding: 0 10px 8px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start;
  scrollbar-width: thin; scrollbar-color: var(--bdr) transparent;
}
.ncard{
  background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--r);
  padding: 12px; display: flex; flex-direction: column; gap: 5px;
  cursor: pointer; min-height: 80px;
}
.ncard:active{ background: var(--sur2); }
.ncard-ttl{ font-size: 12.5px; font-weight: 600; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ncard-body{ font-size: 10.5px; color: var(--tx2); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; flex: 1; }
.ncard-foot{ font-size: 9px; color: var(--tx3); display: flex; justify-content: space-between; align-items: center; margin-top: auto; }

/* ════════════════════════════════════
   REMINDERS / BILLS CARDS
════════════════════════════════════ */
.clist{ flex: 1; overflow-y: auto; padding: 0 10px 8px; display: flex; flex-direction: column; gap: 7px; scrollbar-width: thin; scrollbar-color: var(--bdr) transparent; }
.lcard{
  background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--r);
  padding: 11px 12px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background .12s;
}
.lcard:active{ background: var(--sur2); }
.licon{ width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.linfo{ flex: 1; min-width: 0; }
.lttl{ font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lsub{ font-size: 10.5px; color: var(--tx3); margin-top: 2px; }
.lright{ display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.lurge{ font-size: 10px; font-weight: 700; color: var(--yel); }
.bamt{ font-size: 14px; font-weight: 700; color: var(--ac); font-family: var(--ff); }

/* BILLS summary row */
.bsum{
  flex-shrink: 0; display: flex; align-items: center; gap: 16px;
  background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--rsm);
  margin: 0 10px 8px; padding: 9px 13px;
}
.bsum-i{ display: flex; flex-direction: column; gap: 1px; }
.bsum-l{ font-size: 9.5px; color: var(--tx3); text-transform: uppercase; letter-spacing: .7px; font-weight: 500; }
.bsum-v{ font-size: 15px; font-weight: 700; color: var(--ac); font-family: var(--ff); }
.csv-btn{
  margin-left: auto; display: flex; align-items: center; gap: 4px;
  padding: 5px 11px; border-radius: 16px;
  background: rgba(91,186,143,.12); border: 1px solid rgba(91,186,143,.30);
  color: var(--grn); font-size: 10.5px; font-weight: 600; cursor: pointer;
}
.csv-btn:active{ background: var(--grn); color: #000; }

/* ════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════ */
.bnav{
  flex: 0 0 calc(var(--nav) + var(--sab));
  height: calc(var(--nav) + var(--sab));
  display: flex; align-items: flex-start;
  padding-top: 4px; padding-bottom: var(--sab);
  background: rgba(16,11,7,.88);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid var(--bdr);
}
.nbtn{
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; background: transparent; border: none;
  color: var(--tx3); cursor: pointer;
  padding: 5px 2px; position: relative;
  transition: color .18s;
}
.nbtn.on{ color: var(--ac); }
.nbtn.on::before{
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 20px; height: 2px; background: var(--ac); border-radius: 0 0 3px 3px;
}
.nicon{ font-size: 19px; line-height: 1; }
.nlbl{ font-size: 8.5px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; }

/* ════════════════════════════════════
   MODALS
════════════════════════════════════ */
.overlay{
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 300; display: flex; align-items: flex-end; justify-content: center;
  animation: fi .18s ease;
}
.overlay.hi{ display: none; }
@keyframes fi{ from{ opacity:0 } to{ opacity:1 } }
.modal{
  width: 100%; max-width: 480px;
  background: var(--bg2); border: 1px solid var(--bdr2);
  border-radius: 22px 22px 0 0;
  padding: 16px 16px calc(16px + var(--sab));
  display: flex; flex-direction: column; gap: 12px;
  max-height: 88dvh;
  animation: su .25s cubic-bezier(.34,1.4,.64,1);
}
@keyframes su{ from{ transform:translateY(48px); opacity:0 } to{ transform:none; opacity:1 } }
.mhandle{ width:32px; height:3px; background:var(--bdr2); border-radius:3px; margin:0 auto -4px; }
.mhdr{ display:flex; align-items:center; gap:9px; }
.micon{ font-size:20px; }
.mtitle{ font-family:var(--ff); font-size:18px; font-weight:700; flex:1; color:var(--tx); }
.mclose{
  width:30px; height:30px; border-radius:50%;
  border:1px solid var(--bdr); background:transparent;
  color:var(--tx2); font-size:13px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.mclose:active{ background:rgba(212,91,91,.2); color:var(--red); }
.fscroll{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; scrollbar-width:none; }
.fscroll::-webkit-scrollbar{ display:none }
.fgrp{ display:flex; flex-direction:column; gap:4px; }
.flbl{ font-size:9.5px; font-weight:700; letter-spacing:.9px; text-transform:uppercase; color:var(--tx3); }
.frow{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.fi{
  background:rgba(255,255,255,.06); border:1px solid var(--bdr);
  border-radius:var(--rsm); color:var(--tx);
  font-family:var(--fb); font-size:14px;
  padding:10px 11px; width:100%; outline:none;
  transition:border-color .18s; -webkit-appearance:none;
}
.fi:focus{ border-color:var(--ac); }
.fi option{ background:#231710; }
textarea.fi{ resize:none; min-height:66px; }
.macts{ display:flex; gap:8px; flex-shrink:0; }
.btn-p{
  flex:1; padding:12px; border-radius:var(--rsm);
  background:var(--ac); border:none; color:#fff;
  font-family:var(--fb); font-size:14px; font-weight:700; cursor:pointer;
  transition:opacity .15s;
}
.btn-p:active{ opacity:.82; }
.btn-s{
  padding:12px 18px; border-radius:var(--rsm);
  background:transparent; border:1px solid var(--bdr);
  color:var(--tx2); font-family:var(--fb); font-size:14px; cursor:pointer;
}
.btn-s:active{ background:var(--sur2); }
.rlist{ display:flex; flex-direction:column; gap:7px; max-height:46dvh; overflow-y:auto; }
.ri{
  display:flex; align-items:center; gap:10px;
  padding:9px 11px; border-radius:var(--rsm);
  background:var(--sur); border-left:3px solid var(--yel);
}
.ri-ttl{ flex:1; font-size:12.5px; font-weight:500; }
.ri-d{ font-size:10px; color:var(--yel); font-weight:700; }

/* ─── EMPTY STATE ─── */
.empty{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--tx3); font-size:12px; text-align:center; padding:30px; }
.empty-ic{ font-size:32px; opacity:.35; }
</style>
</head>

<script>
// ══════════════════════════════════════════════
//  DATABASE  (localStorage)
// ══════════════════════════════════════════════
const DB = (() => {
  const K = 'ps_v4';
  const rd = () => { try{ return JSON.parse(localStorage.getItem(K))||[]; }catch{ return []; } };
  const wr = a => localStorage.setItem(K, JSON.stringify(a));
  const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);

  function step(d, rep){
    const n = new Date(d);
    if(rep==='daily')     n.setDate(n.getDate()+1);
    if(rep==='weekly')    n.setDate(n.getDate()+7);
    if(rep==='monthly')   n.setMonth(n.getMonth()+1);
    if(rep==='quarterly') n.setMonth(n.getMonth()+3);
    if(rep==='yearly')    n.setFullYear(n.getFullYear()+1);
    return n;
  }

  function add(ev){
    const all = rd();
    ev.id = uid(); ev.ca = new Date().toISOString();
    all.push(ev);
    if(ev.rep && ev.rep !== 'none'){
      const lim = new Date(); lim.setFullYear(lim.getFullYear()+2);
      let cur = new Date(ev.date+'T00:00:00');
      for(let i=0;i<400;i++){
        cur = step(cur, ev.rep);
        if(cur > lim) break;
        all.push({...ev, id:uid(), date:cur.toISOString().slice(0,10), pid:ev.id, rc:true});
      }
    }
    wr(all); return ev;
  }

  const upd = (id,ch) => wr(rd().map(e=>e.id===id?{...e,...ch}:e));
  const del = id => wr(rd().filter(e=>e.id!==id));
  const byId = id => rd().find(e=>e.id===id);
  const forDate = d => rd().filter(e=>e.date===d);
  const forMonth = (y,m) => { const p=`${y}-${String(m).padStart(2,'0')}`; return rd().filter(e=>e.date?.startsWith(p)); };
  const withRem = () => {
    const today=new Date(); today.setHours(0,0,0,0);
    return rd().filter(e=>{
      if(!e.rem||e.rem==='0') return false;
      const diff=Math.ceil((new Date(e.date+'T00:00:00')-today)/864e5);
      return diff>=0 && diff<=+e.rem;
    });
  };
  const byCat = c => c&&c!=='all' ? rd().filter(e=>e.cat===c) : rd();
  const counts = () => {
    const a=rd(), r={all:a.length};
    ['event','bill','note','meeting','birthday','task','holiday'].forEach(c=>r[c]=a.filter(e=>e.cat===c).length);
    return r;
  };
  return {add,upd,del,byId,forDate,forMonth,withRem,byCat,counts,rd};
})();

// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const CC = {event:'#5b8fd4',bill:'#e8633a',note:'#43c59e',meeting:'#d4aa5b',birthday:'#d48b5b',task:'#5bba8f',holiday:'#9b7fd4'};
const CE = {event:'📅',bill:'💸',note:'📝',meeting:'🤝',birthday:'🎂',task:'✅',holiday:'🏖️'};
const cc = c => CC[c]||'#e8633a';
const ce = c => CE[c]||'📅';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let curTab='Calendar', curFlt='all', calY, calM, selDate;

// ══════════════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════════════
const sm = id => document.getElementById(id).classList.remove('hi');
const hm = id => document.getElementById(id).classList.add('hi');

// ══════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════
function tickClock(){
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});
  document.getElementById('cdt').textContent=n.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
}
setInterval(tickClock,1000); tickClock();

// ══════════════════════════════════════════════
//  TICKER
// ══════════════════════════════════════════════
function renderTicker(){
  const td=today();
  const tm=new Date(); tm.setDate(tm.getDate()+1); const tmS=tm.toISOString().slice(0,10);
  const te=DB.forDate(td), tme=DB.forDate(tmS);
  let parts=te.map(e=>`${ce(e.cat)} ${e.time?e.time+'  ':''}${e.title}`);
  if(tme.length){ parts.push('│ Tomorrow'); tme.forEach(e=>parts.push(`${ce(e.cat)} ${e.title}`)); }
  if(!parts.length) parts=['Nothing today — clear skies ✨'];
  document.getElementById('tkrtxt').textContent=parts.join('   ·   ');
  setTimeout(renderTicker,60000);
}

// ══════════════════════════════════════════════
//  META / CHIP COUNTS
// ══════════════════════════════════════════════
function updateMeta(){
  const all=DB.rd(), td=today();
  const mo=all.filter(e=>e.date?.slice(0,7)===td.slice(0,7)).length;
  const rc=DB.withRem().length;
  document.getElementById('asub').textContent=`${mo} this month · ${rc} reminder${rc!==1?'s':''}`;
  const c=DB.counts();
  Object.keys(c).forEach(k=>{ const el=document.getElementById('cc-'+k); if(el) el.textContent=c[k]; });
}

// ══════════════════════════════════════════════
//  CALENDAR
// ══════════════════════════════════════════════
const today=()=>new Date().toISOString().slice(0,10);

function renderCal(){
  document.getElementById('calLbl').textContent=`${MONTHS[calM-1]} ${calY}`;
  const grid=document.getElementById('cg'); grid.innerHTML='';
  const td=today();
  const evMap={};
  DB.forMonth(calY,calM).forEach(e=>{
    if(curFlt!=='all'&&e.cat!==curFlt) return;
    (evMap[e.date]=evMap[e.date]||[]).push(e);
  });

  const first=new Date(calY,calM-1,1).getDay();
  const dim=new Date(calY,calM,0).getDate();
  const diPrev=new Date(calY,calM-1,0).getDate();
  const rows=Math.ceil((first+dim)/7);
  const total=rows*7;

  // ── FIXED CELL HEIGHT COMPUTATION ──
  // Measure actual rendered main area (works on any phone)
  const mainH = document.querySelector('main').getBoundingClientRect().height;
  // Heights of non-grid elements inside .cal-wrap:
  const CAL_HDR_H  = 44;  // .cal-hdr (month label + nav)
  const WDAYS_H    = 22;  // weekday labels row
  const CAL_PAD_B  = 14;  // grid bottom padding + card bottom
  const PREV_MIN   = 112; // day-preview minimum height
  const GAPS       = 11;  // cal-wrap gap + margin-bottom on preview
  // Card gets everything except the preview panel
  const cardH = Math.floor(mainH - PREV_MIN - GAPS);
  // Grid area = card minus its chrome
  const gridH = cardH - CAL_HDR_H - WDAYS_H - CAL_PAD_B;
  // Each row gets equal share — FIXED, never changes with content
  const rowH  = Math.max(Math.floor(gridH / rows), 40);

  // Apply fixed dimensions
  const calCard = document.getElementById('calCard');
  calCard.style.height    = cardH + 'px';
  calCard.style.minHeight = cardH + 'px';
  calCard.style.maxHeight = cardH + 'px';
  // Lock every row to identical height — THIS prevents cell size changes
  grid.style.gridTemplateRows = `repeat(${rows}, ${rowH}px)`;

  // How many pills can physically fit in remaining cell height after date number
  const dateNumH = 26; // dnum-wrap height including padding
  const pillH    = 13; // each pill height including gap
  const maxPills = Math.max(0, Math.floor((rowH - dateNumH) / pillH));

  for(let i=0;i<total;i++){
    let day,mo=calM,yr=calY,oth=false;
    if(i<first){day=diPrev-first+i+1;mo=calM-1;oth=true;if(mo<1){mo=12;yr--;}}
    else if(i>=first+dim){day=i-first-dim+1;mo=calM+1;oth=true;if(mo>12){mo=1;yr++;}}
    else{day=i-first+1;}
    const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const evs=evMap[ds]||[];
    const cell=document.createElement('div');
    let cls='cday'+(oth?' oth':'')+(ds===td?' tod':'')+(ds===selDate?' sel':'');
    cell.className=cls; cell.dataset.ds=ds;
    cell.innerHTML=`<div class="dnum">${day}</div>`;
    if(evs.length){
      const box=document.createElement('div'); box.className='dpills';
      evs.slice(0,maxPills).forEach(ev=>{
        const p=document.createElement('div'); p.className='dpill';
        p.style.cssText=`background:${cc(ev.cat)}22;color:${cc(ev.cat)};border-left:2px solid ${cc(ev.cat)}`;
        p.textContent=(ev.time?ev.time.slice(0,5)+' ':'')+ev.title;
        box.appendChild(p);
      });
      if(evs.length>maxPills){
        const m=document.createElement('div'); m.className='dpmore';
        m.textContent=`+${evs.length-maxPills}`;
        box.appendChild(m);
      }
      cell.appendChild(box);
    }
    cell.addEventListener('click',()=>{
      document.querySelectorAll('.cday.sel').forEach(c=>c.classList.remove('sel'));
      cell.classList.add('sel'); selDate=ds; renderDP(ds);
    });
    grid.appendChild(cell);
  }
}

function renderDP(ds){
  const td=today();
  const title=document.getElementById('dpTitle');
  if(ds===td) title.textContent="Today's Events";
  else title.textContent=new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let evs=DB.forDate(ds);
  if(curFlt!=='all') evs=evs.filter(e=>e.cat===curFlt);
  evs.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  const list=document.getElementById('dpList'); list.innerHTML='';
  if(!evs.length){list.innerHTML='<div class="dp-empty">No events — tap + to add</div>';return;}
  evs.forEach(ev=>{
    const el=document.createElement('div');
    el.className='dp-item'; el.style.borderLeftColor=cc(ev.cat);
    el.innerHTML=`<span class="dp-time">${ev.time||'--:--'}</span>
      <span class="dp-name">${ce(ev.cat)} ${ev.title}</span>
      <div class="dp-acts">
        <button class="ibtn" onclick="editEv('${ev.id}');event.stopPropagation()">✎</button>
        <button class="ibtn d" onclick="delEv('${ev.id}');event.stopPropagation()">✕</button>
      </div>`;
    list.appendChild(el);
  });
}

// ══════════════════════════════════════════════
//  AGENDA
// ══════════════════════════════════════════════
function renderAgenda(){
  const el=document.getElementById('agList');
  let evs=DB.byCat(curFlt).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  const td=today(), tm=new Date(); tm.setDate(tm.getDate()+1); const tmS=tm.toISOString().slice(0,10);
  const grps={}; evs.forEach(e=>(grps[e.date]=grps[e.date]||[]).push(e));
  el.innerHTML='';
  if(!Object.keys(grps).length){el.innerHTML='<div class="empty"><div class="empty-ic">☰</div>No events yet</div>';return;}
  Object.keys(grps).sort().forEach(ds=>{
    const g=document.createElement('div'); g.className='ag-group';
    let lbl=new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    if(ds===td) lbl='📌 Today'; else if(ds===tmS) lbl='⏩ Tomorrow';
    g.innerHTML=`<div class="ag-lbl">${lbl}</div>`;
    grps[ds].forEach(ev=>{
      const it=document.createElement('div'); it.className='ag-item';
      it.innerHTML=`<div class="ag-bar" style="background:${cc(ev.cat)}"></div>
        <div class="ag-info">
          <div class="ag-ttl">${ce(ev.cat)} ${ev.title}</div>
          <div class="ag-met">
            ${ev.time?`<span>⏰ ${ev.time}</span>`:''}
            ${ev.loc?`<span>📍 ${ev.loc}</span>`:''}
            ${ev.rep&&ev.rep!=='none'?`<span>🔁 ${ev.rep}</span>`:''}
            ${ev.amt?`<span>₹${(+ev.amt).toLocaleString('en-IN')}</span>`:''}
          </div>
        </div>
        <div class="ag-acts">
          <button class="ibtn" onclick="editEv('${ev.id}')">✎</button>
          <button class="ibtn d" onclick="delEv('${ev.id}')">✕</button>
        </div>`;
      g.appendChild(it);
    });
    el.appendChild(g);
  });
}

// ══════════════════════════════════════════════
//  NOTES
// ══════════════════════════════════════════════
function renderNotes(){
  const el=document.getElementById('nList');
  const evs=DB.byCat('note').sort((a,b)=>(b.ca||'').localeCompare(a.ca||''));
  el.innerHTML='';
  if(!evs.length){el.innerHTML='<div class="empty" style="grid-column:span 2"><div class="empty-ic">📝</div>No notes yet</div>';return;}
  evs.forEach(ev=>{
    const c=document.createElement('div'); c.className='ncard';
    c.style.borderTop=`3px solid ${cc('note')}`;
    c.innerHTML=`<div class="ncard-ttl">${ev.title}</div>
      ${ev.notes?`<div class="ncard-body">${ev.notes}</div>`:''}
      <div class="ncard-foot">
        <span>${ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</span>
        <div style="display:flex;gap:3px">
          <button class="ibtn" style="width:22px;height:22px" onclick="editEv('${ev.id}')">✎</button>
          <button class="ibtn d" style="width:22px;height:22px" onclick="delEv('${ev.id}')">✕</button>
        </div>
      </div>`;
    el.appendChild(c);
  });
}

// ══════════════════════════════════════════════
//  REMINDERS
// ══════════════════════════════════════════════
function renderReminders(){
  const el=document.getElementById('remList');
  const now=new Date(); now.setHours(0,0,0,0);
  const evs=DB.rd().filter(e=>e.rem&&e.rem!=='0').sort((a,b)=>a.date.localeCompare(b.date));
  el.innerHTML='';
  if(!evs.length){el.innerHTML='<div class="empty"><div class="empty-ic">🔔</div>No reminders set</div>';return;}
  evs.forEach(ev=>{
    const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5);
    const dlbl=diff<0?`${Math.abs(diff)}d ago`:diff===0?'Today!':diff===1?'Tomorrow':`in ${diff}d`;
    const uc=diff>=0&&diff<=+ev.rem?'var(--yel)':'var(--tx3)';
    const c=document.createElement('div'); c.className='lcard';
    c.innerHTML=`<div class="licon" style="background:${cc(ev.cat)}22">${ce(ev.cat)}</div>
      <div class="linfo">
        <div class="lttl">${ev.title}</div>
        <div class="lsub">${fDate(ev.date)} · Remind ${ev.rem}d before</div>
      </div>
      <div class="lright">
        <span class="lurge" style="color:${uc}">${dlbl}</span>
        <div style="display:flex;gap:4px">
          <button class="ibtn" onclick="editEv('${ev.id}')">✎</button>
          <button class="ibtn d" onclick="delEv('${ev.id}')">✕</button>
        </div>
      </div>`;
    el.appendChild(c);
  });
}

// ══════════════════════════════════════════════
//  BILLS
// ══════════════════════════════════════════════
function renderBills(){
  const el=document.getElementById('bList');
  const now=new Date(); now.setHours(0,0,0,0);
  const bills=DB.byCat('bill').sort((a,b)=>a.date.localeCompare(b.date));
  const td=today();
  const mo=bills.filter(b=>b.date?.slice(0,7)===td.slice(0,7)).reduce((s,b)=>s+(+b.amt||0),0);
  const up=bills.filter(b=>new Date(b.date+'T00:00:00')>=now).reduce((s,b)=>s+(+b.amt||0),0);
  document.getElementById('bMonth').textContent='₹'+mo.toLocaleString('en-IN',{minimumFractionDigits:0});
  document.getElementById('bUp').textContent='₹'+up.toLocaleString('en-IN',{minimumFractionDigits:0});
  el.innerHTML='';
  if(!bills.length){el.innerHTML='<div class="empty"><div class="empty-ic">💸</div>No bills yet</div>';return;}
  bills.forEach(ev=>{
    const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5);
    const past=diff<0;
    const c=document.createElement('div'); c.className='lcard'; c.style.opacity=past?'.55':'1';
    c.innerHTML=`<div class="licon" style="background:rgba(232,99,58,.15)">💸</div>
      <div class="linfo">
        <div class="lttl">${ev.title}</div>
        <div class="lsub">${fDate(ev.date)}${ev.rep&&ev.rep!=='none'?' · 🔁 '+ev.rep:''}${past?' · <span style="color:var(--red)">Overdue</span>':''}</div>
      </div>
      <div class="lright">
        ${ev.amt?`<div class="bamt">₹${(+ev.amt).toLocaleString('en-IN',{minimumFractionDigits:0})}</div>`:''}
        ${!past&&diff<=7?`<span class="lurge">Due in ${diff}d</span>`:''}
        <div style="display:flex;gap:4px">
          <button class="ibtn" onclick="editEv('${ev.id}')">✎</button>
          <button class="ibtn d" onclick="delEv('${ev.id}')">✕</button>
        </div>
      </div>`;
    el.appendChild(c);
  });
}

// ══════════════════════════════════════════════
//  CSV EXPORT
// ══════════════════════════════════════════════
function exportCSV(){
  const hd=['Title','Date','Time','Category','Location','Amount','Reminder','Repeat','Notes','Created'];
  const rows=DB.rd().map(e=>[
    `"${(e.title||'').replace(/"/g,'""')}"`,
    e.date||'',e.time||'',e.cat||'',
    `"${(e.loc||'').replace(/"/g,'""')}"`,
    e.amt||'',e.rem||'',e.rep||'',
    `"${(e.notes||'').replace(/"/g,'""')}"`,e.ca||''
  ].join(','));
  const a=Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(new Blob([[hd.join(','),...rows].join('\n')],{type:'text/csv'})),
    download:`PlannerS_${today()}.csv`
  });
  a.click();
}

// ══════════════════════════════════════════════
//  EVENT MODAL
// ══════════════════════════════════════════════
function openEv(defCat){
  document.getElementById('eid').value='';
  document.getElementById('mt').textContent='New Event';
  document.getElementById('mi').textContent='✦';
  document.getElementById('et').value='';
  document.getElementById('ed').value=today();
  document.getElementById('etm').value='';
  document.getElementById('ec').value=defCat||'event';
  document.getElementById('el').value='';
  document.getElementById('er').value='0';
  document.getElementById('erp').value='none';
  document.getElementById('ea').value='';
  document.getElementById('en').value='';
  sm('eModal');
}

function editEv(id){
  const ev=DB.byId(id); if(!ev) return;
  document.getElementById('eid').value=ev.id;
  document.getElementById('mt').textContent='Edit Event';
  document.getElementById('mi').textContent='✎';
  document.getElementById('et').value=ev.title||'';
  document.getElementById('ed').value=ev.date||'';
  document.getElementById('etm').value=ev.time||'';
  document.getElementById('ec').value=ev.cat||'event';
  document.getElementById('el').value=ev.loc||'';
  document.getElementById('er').value=ev.rem||'0';
  document.getElementById('erp').value=ev.rep||'none';
  document.getElementById('ea').value=ev.amt||'';
  document.getElementById('en').value=ev.notes||'';
  sm('eModal');
}

function saveEv(){
  const title=document.getElementById('et').value.trim();
  const date=document.getElementById('ed').value;
  if(!title||!date){alert('Title and date are required');return;}
  const ev={
    title,date,
    time:document.getElementById('etm').value,
    cat:document.getElementById('ec').value,
    loc:document.getElementById('el').value.trim(),
    rem:document.getElementById('er').value,
    rep:document.getElementById('erp').value,
    amt:document.getElementById('ea').value,
    notes:document.getElementById('en').value.trim()
  };
  const id=document.getElementById('eid').value;
  if(id) DB.upd(id,ev); else DB.add(ev);
  hm('eModal'); refreshAll();
}

function delEv(id){
  if(!confirm('Delete this event?')) return;
  DB.del(id); refreshAll();
}

// ══════════════════════════════════════════════
//  REMINDER POPUP
// ══════════════════════════════════════════════
function checkReminders(){
  const evs=DB.withRem(); if(!evs.length) return;
  const now=new Date(); now.setHours(0,0,0,0);
  const list=document.getElementById('rList'); list.innerHTML='';
  evs.forEach(ev=>{
    const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5);
    const it=document.createElement('div'); it.className='ri';
    it.innerHTML=`<span style="font-size:18px">${ce(ev.cat)}</span>
      <span class="ri-ttl">${ev.title}</span>
      <span class="ri-d">${diff===0?'Today!':diff===1?'Tomorrow':`in ${diff}d`}</span>`;
    list.appendChild(it);
  });
  sm('rModal');
}

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab'+tab).classList.add('on');
  // Filter bar only for Calendar + Agenda
  document.getElementById('fltRow').style.display=(tab==='Calendar'||tab==='Agenda')?'flex':'none';
  if(tab==='Agenda')    renderAgenda();
  if(tab==='Notes')     renderNotes();
  if(tab==='Reminders') renderReminders();
  if(tab==='Bills')     renderBills();
  if(tab==='Calendar')  {renderCal();renderDP(selDate);}
}

// ══════════════════════════════════════════════
//  REFRESH
// ══════════════════════════════════════════════
function refreshAll(){
  updateMeta(); renderTicker();
  renderCal(); renderDP(selDate);
  if(curTab==='Agenda')    renderAgenda();
  if(curTab==='Notes')     renderNotes();
  if(curTab==='Reminders') renderReminders();
  if(curTab==='Bills')     renderBills();
}

// ══════════════════════════════════════════════
//  DATE FORMAT HELPER
// ══════════════════════════════════════════════
function fDate(s){ return s?new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''; }

// ══════════════════════════════════════════════
//  SEED DATA
// ══════════════════════════════════════════════
function seed(){
  if(localStorage.getItem('ps_seeded_v4')) return;
  const off=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
  [
    {title:'Team Standup',date:off(0),time:'09:30',cat:'meeting',rem:'1',rep:'daily'},
    {title:'Electricity Bill',date:off(3),cat:'bill',amt:'2400',rem:'3',rep:'monthly'},
    {title:'Recipe ideas',date:off(0),cat:'note',notes:'Kerala fish curry — mustard seeds, curry leaves, kokum.'},
    {title:"Mum's Birthday",date:off(5),cat:'birthday',rem:'7',rep:'yearly'},
    {title:'Dentist',date:off(2),time:'11:00',cat:'event',loc:'City Dental Clinic',rem:'2'},
    {title:'Netflix',date:off(10),cat:'bill',amt:'649',rep:'monthly',rem:'3'},
    {title:'Follow up with client',date:off(4),cat:'task'},
    {title:'Coaching session',date:off(5),time:'16:00',cat:'meeting',rep:'weekly'},
    {title:'Ekadashi fast',date:off(13),cat:'holiday',rem:'5',rep:'monthly'},
    {title:'Interview panel',date:off(6),cat:'event',notes:'Prep: backend + system design'},
  ].forEach(e=>DB.add({rep:'none',rem:'0',...e}));
  localStorage.setItem('ps_seeded_v4','1');
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
(function init(){
  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  const now=new Date(); calY=now.getFullYear(); calM=now.getMonth()+1; selDate=today();
  seed(); updateMeta(); renderTicker();
  // Double rAF: ensures browser has painted and dimensions are real
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    renderCal(); renderDP(selDate);
  }));

  // Nav
  document.querySelectorAll('.nbtn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

  // Cal prev/next/today
  document.getElementById('prev').addEventListener('click',()=>{calM--;if(calM<1){calM=12;calY--;}renderCal();});
  document.getElementById('next').addEventListener('click',()=>{calM++;if(calM>12){calM=1;calY++;}renderCal();});
  document.getElementById('todayBtn').addEventListener('click',()=>{
    const n=new Date(); calY=n.getFullYear(); calM=n.getMonth()+1; selDate=today();
    renderCal(); renderDP(selDate);
  });

  // Filters
  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      chip.classList.add('on'); curFlt=chip.dataset.f;
      renderCal(); renderDP(selDate);
      if(curTab==='Agenda') renderAgenda();
    });
  });

  // Reminders popup after brief delay
  window.addEventListener('resize',()=>requestAnimationFrame(renderCal));
  setTimeout(checkReminders,700);
})();
</script>
