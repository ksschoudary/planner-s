<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Planner S"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#100b07"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg" type="image/svg+xml"/>
<title>Planner S</title>
<meta name="referrer" content="no-referrer"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none}

:root{--_sab:env(safe-area-inset-bottom,0px);
  --bg:#100b07;--bg2:#231710;
  --sur:rgba(255,255,255,.055);--sur2:rgba(255,255,255,.09);
  --bdr:rgba(255,255,255,.10);--bdr2:rgba(255,255,255,.17);
  --tx:#f5ede6;--tx2:rgba(245,237,230,.90);--tx3:rgba(245,237,230,.62);
  --ac:#e8633a;--ac2:rgba(232,99,58,.16);--ac3:rgba(232,99,58,.28);
  --grn:#5bba8f;--yel:#d4aa5b;--red:#d45b5b;
  --r:13px;--rsm:9px;
  --ff:'Playfair Display',Georgia,serif;
  --fb:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  --sat:env(safe-area-inset-top,0px);
}

html{height:100%;height:-webkit-fill-available;}
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  overflow:hidden;
  background:#100b07;
}
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  overflow:hidden;
  background:#100b07;
}

/* APP — pinned to all 4 screen edges, no height property */
#app{
  position:fixed;
  top:0;
  left:0;
  right:0;
  /* dynamic viewport height — fills the visible screen */
  height:100vh;
  height:100svh;
  height:100dvh;
  box-sizing:border-box;
  /* ONLY top + sides padded here. Bottom safe-area is owned by the
     nav so its background reaches the true screen edge (no gap). */
  padding-top:env(safe-area-inset-top, 0px);
  padding-left:env(safe-area-inset-left, 0px);
  padding-right:env(safe-area-inset-right, 0px);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
.hdr{
  flex:0 0 auto;
  padding:12px 16px 12px;
  display:flex;flex-direction:column;gap:6px;
  min-height:76px;
}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;}
.clkpill{display:flex;align-items:center;gap:7px;background:var(--sur);border:1px solid var(--bdr);border-radius:18px;padding:4px 12px 4px 8px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ac);flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,99,58,.55)}50%{box-shadow:0 0 0 5px rgba(232,99,58,0)}}
.clkt{font-size:15px;font-weight:700;letter-spacing:.5px;color:var(--tx);}
.clksep{color:var(--tx3);font-size:11px;}
.clkd{font-size:11px;color:var(--tx2);}
.addbtn{width:38px;height:38px;border-radius:11px;background:var(--ac);border:none;color:#fff;font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 14px rgba(232,99,58,.45);}
.addbtn:active{transform:scale(.88);}
.hdr-r2{display:flex;align-items:baseline;gap:9px;}
.apptitle{font-family:var(--ff);font-size:26px;font-weight:900;letter-spacing:-.5px;line-height:1;color:var(--tx);}
.appsub{font-size:10px;color:var(--tx3);}

/* TICKER */
.tkr{flex:0 0 30px;height:30px;display:flex;align-items:center;gap:8px;padding:0 12px;margin:2px 0;background:rgba(232,99,58,.07);border-top:1px solid rgba(232,99,58,.12);border-bottom:1px solid rgba(232,99,58,.12);overflow:hidden;}
.tkrlbl{font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--ac);background:var(--ac2);border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;}
.tkrtrack{flex:1;overflow:hidden;}
.tkrtxt{display:inline-block;white-space:nowrap;font-size:12px;color:var(--tx);padding-left:100%;animation:marquee 30s linear infinite;}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-100%)}}

/* FILTERS */
.flt{flex:0 0 44px;height:44px;display:flex;align-items:center;gap:7px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;}
.flt::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:16px;border:1px solid var(--bdr);background:transparent;color:var(--tx2);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.chip.on{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(232,99,58,.4);}
.cc{background:rgba(0,0,0,.2);border-radius:7px;padding:1px 5px;font-size:9px;font-weight:700;min-width:15px;text-align:center;}
.chip:not(.on) .cc{background:var(--sur2);}

/* MAIN */
main{flex:1 1 0;min-height:0;overflow:hidden;position:relative;}
.tab{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.tab.on{display:flex;}

/* CALENDAR TAB */
.calwrap{flex:1;min-height:0;display:flex;flex-direction:column;padding:6px 10px 8px;gap:10px;overflow:hidden;}
.calcard{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;}
.calhdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 4px;height:40px;}
.calmonth{font-family:var(--ff);font-size:19px;font-weight:700;color:var(--tx);}
.calnav{display:flex;align-items:center;gap:5px;}
.tbtn{font-size:10px;font-weight:600;color:var(--ac);background:var(--ac2);border:1px solid var(--ac3);border-radius:12px;padding:3px 9px;cursor:pointer;}
.arr{width:27px;height:27px;border-radius:50%;background:var(--sur2);border:1px solid var(--bdr);color:var(--tx2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.arr:active{background:var(--bdr2);}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);height:20px;padding:0 4px;}
.wdays span{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;letter-spacing:.7px;color:var(--tx2);text-transform:uppercase;}
.calgrid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:7px;padding:4px 8px 12px;}
.cday{overflow:hidden;border-radius:13px;display:flex;flex-direction:column;align-items:stretch;cursor:pointer;transition:background .12s;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);}
.cday:active{background:var(--sur2);}
.cday.oth{opacity:.3;background:transparent;border-color:transparent;}
.cday.tod{background:var(--ac2);}
.cday.sel{background:rgba(232,99,58,.2);outline:1.5px solid var(--ac3);outline-offset:-1px;}
.dnw{display:flex;justify-content:center;padding-top:6px;flex-shrink:0;height:32px;}
.dnum{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--tx);line-height:1;}
.cday.tod .dnum{background:var(--ac);color:#fff;font-weight:700;}
.cday.sel:not(.tod) .dnum{color:var(--ac);font-weight:600;}
.dpills{flex:1;min-height:0;display:flex;flex-direction:column;gap:2px;padding:0 3px 3px;overflow:hidden;}
.dpill{flex-shrink:0;font-size:10px;font-weight:600;padding:2px 5px;border-radius:5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.45;}
.dpmore{flex-shrink:0;font-size:8px;color:var(--tx2);padding:0 4px;line-height:1.3;font-weight:600;}

/* DAY PREVIEW */
.dayprev{flex:0 0 72px;height:72px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;}
.dphdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 6px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.dptitle{font-size:14px;font-weight:600;color:var(--tx);}
.dpadd{font-size:10px;color:var(--ac);font-weight:600;background:var(--ac2);border:1px solid var(--ac3);border-radius:10px;padding:3px 9px;cursor:pointer;}
.dplist{flex:1;overflow-y:auto;padding:5px 8px;display:flex;flex-direction:column;gap:4px;scrollbar-width:none;}
.dplist::-webkit-scrollbar{display:none}
.dpitem{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;background:var(--sur2);border-left:3px solid var(--ac);flex-shrink:0;}
.dptime{font-size:11px;color:var(--ac);min-width:34px;font-weight:600;}
.dpname{flex:1;font-size:13px;color:var(--tx);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.dpacts{display:flex;gap:3px;flex-shrink:0;}
.ibtn{width:24px;height:24px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--tx3);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ibtn:active{background:var(--sur2);color:var(--tx);}
.ibtn.d:active{border-color:var(--red);color:var(--red);}
.dpempty{text-align:center;padding:14px;color:var(--tx2);font-size:13px;font-style:italic;}

/* OTHER TABS */
.tabttl{font-family:var(--ff);font-size:21px;font-weight:700;padding:9px 14px 5px;flex-shrink:0;color:var(--tx);}
.slist{flex:1;overflow-y:auto;padding:0 10px 8px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;}
.aggrp{margin-bottom:11px;}
.aglbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ac);padding:0 2px 4px;}
.agitem{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--rsm);background:var(--sur);border:1px solid var(--bdr);margin-bottom:4px;cursor:pointer;}
.agitem:active{background:var(--sur2);}
.agbar{width:3px;height:30px;border-radius:3px;flex-shrink:0;}
.aginfo{flex:1;min-width:0;}
.agttl{font-size:14px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.agmet{font-size:11px;color:var(--tx2);display:flex;gap:7px;margin-top:2px;flex-wrap:wrap;}
.agacts{display:flex;gap:4px;flex-shrink:0;}
.ngrid{flex:1;overflow-y:auto;padding:0 10px 8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;}
.ncard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:11px;display:flex;flex-direction:column;gap:5px;min-height:78px;cursor:pointer;}
.ncard:active{background:var(--sur2);}
.ncard-t{font-size:13px;font-weight:600;color:var(--tx);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.ncard-b{font-size:10.5px;color:var(--tx2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;flex:1;}
.ncard-f{font-size:9px;color:var(--tx3);display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
.clist{flex:1;overflow-y:auto;padding:0 10px 8px;display:flex;flex-direction:column;gap:7px;}
.lcard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.lcard:active{background:var(--sur2);}
.licon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.linfo{flex:1;min-width:0;}
.lttl{font-size:14px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lsub{font-size:11px;color:var(--tx2);margin-top:2px;}
.lright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.lurge{font-size:10px;font-weight:700;color:var(--yel);}
.bamt{font-size:14px;font-weight:700;color:var(--ac);font-family:var(--ff);}
.bsum{flex-shrink:0;display:flex;align-items:center;gap:14px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rsm);margin:0 10px 7px;padding:8px 12px;}
.bsuml{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px;font-weight:500;}
.bsumv{font-size:14px;font-weight:700;color:var(--ac);font-family:var(--ff);}
.csvbtn{margin-left:auto;padding:5px 10px;border-radius:14px;background:rgba(91,186,143,.12);border:1px solid rgba(91,186,143,.28);color:var(--grn);font-size:10px;font-weight:600;cursor:pointer;}
.csvbtn:active{background:var(--grn);color:#000;}

/* =============================================
   BOTTOM NAV — fixed height, no safe area math
   ============================================= */
.bnav{
  flex:0 0 auto;
  height:calc(54px + env(safe-area-inset-bottom, 0px));
  /* Center buttons in the available space ABOVE the home indicator.
     padding-bottom reserves the safe area; align-items:center then
     vertically centers icons in the remaining 54px so they don't
     cluster at the top leaving dead space. */
  padding-bottom:env(safe-area-inset-bottom, 0px);
  display:flex;
  align-items:center;
  background:rgba(16,11,7,.97);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--bdr);
}
.nbtn{height:54px;
  flex:1;
  
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  background:transparent;
  border:none;
  color:var(--tx2);
  cursor:pointer;
  padding:0;
  position:relative;
  transition:color .15s;
}
.nbtn.on{color:var(--ac);}
.nbtn.on::before{
  content:'';
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:20px;height:2px;
  background:var(--ac);
  border-radius:0 0 3px 3px;
}
.nicon{font-size:21px;line-height:1;}
.nlbl{font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;}
/* In PWA (standalone) the nav sits lower — extra bottom breathing room
   beyond the home indicator, since there's no Safari toolbar below it */
@media (display-mode: standalone){
  /* PWA: whole nav bar is 40px taller and buttons are vertically
     centered, so the icons sit ~40px lower than the Safari layout.
     The home-indicator safe area is added on top of that. */
  .bnav{
    height:calc(56px + 40px + env(safe-area-inset-bottom, 0px));
    padding-top:40px;
    padding-bottom:env(safe-area-inset-bottom, 0px);
    align-items:flex-start;
  }
  .nbtn{ height:56px; }
}

/* MODALS */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .18s ease;}
.ovl.hi{display:none;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:20px;padding:18px 16px 18px;display:flex;flex-direction:column;gap:11px;max-height:88vh;animation:su .24s cubic-bezier(.34,1.4,.64,1);}
@keyframes su{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.mhandle{width:30px;height:3px;background:var(--bdr2);border-radius:3px;margin:0 auto -3px;}
.mhdr{display:flex;align-items:center;gap:9px;}
.micon{font-size:19px;}
.mtitle{font-family:var(--ff);font-size:17px;font-weight:700;flex:1;color:var(--tx);}
.mclose{width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:transparent;color:var(--tx2);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.mclose:active{background:rgba(212,91,91,.2);color:var(--red);}
.fscroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;scrollbar-width:none;}
.fscroll::-webkit-scrollbar{display:none}
.fgrp{display:flex;flex-direction:column;gap:4px;}
.flbl{font-size:9px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--tx3);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fi{background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:var(--rsm);color:var(--tx);font-size:14px;padding:10px 11px;width:100%;outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--ac);}
.fi option{background:#231710;}
textarea.fi{resize:none;min-height:62px;}
.macts{display:flex;gap:8px;flex-shrink:0;}
.btnp{flex:1;padding:12px;border-radius:var(--rsm);background:var(--ac);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.btnp:active{opacity:.82;}
.btns{padding:12px 16px;border-radius:var(--rsm);background:transparent;border:1px solid var(--bdr);color:var(--tx2);font-size:14px;cursor:pointer;}
.btns:active{background:var(--sur2);}
.rlist{display:flex;flex-direction:column;gap:7px;max-height:50vh;overflow-y:auto;}
.ri{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--rsm);background:var(--sur);border-left:3px solid var(--yel);}
.rit{flex:1;font-size:14px;font-weight:600;color:var(--tx);}
.rid{font-size:10px;color:var(--yel);font-weight:700;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--tx3);font-size:12px;text-align:center;padding:30px;}
.empty-ic{font-size:30px;opacity:.35;}
</style>
</head>
<body>

<!-- REMINDER MODAL -->
<div id="rModal" class="ovl hi">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mhdr"><span class="micon">🔔</span><h3 class="mtitle">Upcoming Reminders</h3><button class="mclose" onclick="hm('rModal')">✕</button></div>
    <div id="rList" class="rlist"></div>
    <button class="btnp" onclick="hm('rModal')">Got it</button>
  </div>
</div>

<!-- EVENT MODAL -->
<div id="eModal" class="ovl hi">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mhdr"><span class="micon" id="mi">✦</span><h3 class="mtitle" id="mt">New Event</h3><button class="mclose" onclick="hm('eModal')">✕</button></div>
    <div class="fscroll">
      <input type="hidden" id="eid"/>
      <div class="fgrp"><div class="flbl">Title *</div><input type="text" id="et" class="fi" placeholder="What's happening?"/></div>
      <div class="frow">
        <div class="fgrp"><div class="flbl">Date *</div><input type="date" id="ed" class="fi"/></div>
        <div class="fgrp"><div class="flbl">Time</div><input type="time" id="etm" class="fi"/></div>
      </div>
      <div class="fgrp"><div class="flbl">Category</div>
        <select id="ec" class="fi">
          <option value="event">📅 Event</option><option value="bill">💸 Bill</option>
          <option value="note">📝 Note</option><option value="meeting">🤝 Meeting</option>
          <option value="birthday">🎂 Birthday</option><option value="task">✅ Task</option>
          <option value="holiday">🏖️ Holiday</option>
        </select>
      </div>
      <div class="fgrp"><div class="flbl">Location</div><input type="text" id="el" class="fi" placeholder="Optional…"/></div>
      <div class="frow">
        <div class="fgrp"><div class="flbl">Reminder</div>
          <select id="er" class="fi">
            <option value="0">None</option><option value="1">1 day before</option>
            <option value="2">2 days before</option><option value="3">3 days before</option>
            <option value="5">5 days before</option><option value="7">7 days before</option>
          </select>
        </div>
        <div class="fgrp"><div class="flbl">Repeat</div>
          <select id="erp" class="fi">
            <option value="none">None</option><option value="daily">Daily</option>
            <option value="weekly">Weekly</option><option value="monthly">Monthly</option>
            <option value="quarterly">Quarterly</option><option value="yearly">Yearly</option>
          </select>
        </div>
      </div>
      <div class="fgrp"><div class="flbl">Amount (Bills)</div><input type="number" id="ea" class="fi" placeholder="₹ 0"/></div>
      <div class="fgrp"><div class="flbl">Notes</div><textarea id="en" class="fi" rows="3" placeholder="Additional notes…"></textarea></div>
    </div>
    <div class="macts"><button class="btns" onclick="hm('eModal')">Cancel</button><button class="btnp" onclick="saveEv()">Save Event</button></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hdr-r1">

<script>
// Unregister all old service workers first
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
  // Re-register fresh
  setTimeout(()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}), 500);

const DB=(()=>{
  const K='ps_v6';
  const rd=()=>{try{return JSON.parse(localStorage.getItem(K))||[];}catch{return[];}};
  const wr=a=>localStorage.setItem(K,JSON.stringify(a));
  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
  // Local YYYY-MM-DD (avoids UTC shift that toISOString causes in +offset timezones)
  const ymd=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  function step(d,r){
    const n=new Date(d);
    if(r==='daily')n.setDate(n.getDate()+1);
    else if(r==='weekly')n.setDate(n.getDate()+7);
    else if(r==='monthly')n.setMonth(n.getMonth()+1);
    else if(r==='quarterly')n.setMonth(n.getMonth()+3);
    else if(r==='yearly')n.setFullYear(n.getFullYear()+1);
    return n;
  }
  function add(ev){
    const all=rd();ev.id=uid();ev.ca=new Date().toISOString();all.push(ev);
    if(ev.rep&&ev.rep!=='none'){
      const base=new Date(ev.date+'T00:00:00');
      const baseDay=base.getDate();
      // How many occurrences and what stepping for each repeat type
      const addOcc=(dt)=>all.push({...ev,id:uid(),date:ymd(dt),pid:ev.id,rc:true});
      if(ev.rep==='daily'){
        for(let i=1;i<=365;i++){const d=new Date(base);d.setDate(base.getDate()+i);addOcc(d);}
      } else if(ev.rep==='weekly'){
        for(let i=1;i<=52;i++){const d=new Date(base);d.setDate(base.getDate()+i*7);addOcc(d);}
      } else if(ev.rep==='monthly'){
        // SAME DAY each month, clamped to month length, 12 months
        for(let i=1;i<=12;i++){
          const y=base.getFullYear(), m=base.getMonth()+i;
          const targetY=y+Math.floor(m/12), targetM=m%12;
          const lastDay=new Date(targetY,targetM+1,0).getDate();
          const day=Math.min(baseDay,lastDay);
          addOcc(new Date(targetY,targetM,day));
        }
      } else if(ev.rep==='quarterly'){
        for(let i=1;i<=4;i++){
          const y=base.getFullYear(), m=base.getMonth()+i*3;
          const targetY=y+Math.floor(m/12), targetM=m%12;
          const lastDay=new Date(targetY,targetM+1,0).getDate();
          const day=Math.min(baseDay,lastDay);
          addOcc(new Date(targetY,targetM,day));
        }
      } else if(ev.rep==='yearly'){
        for(let i=1;i<=3;i++){const d=new Date(base);d.setFullYear(base.getFullYear()+i);addOcc(d);}
      }
    }
    wr(all);return ev;
  }
  const upd=(id,ch)=>wr(rd().map(e=>e.id===id?{...e,...ch}:e));
  const del=id=>wr(rd().filter(e=>e.id!==id));
  const byId=id=>rd().find(e=>e.id===id);
  const forDate=d=>rd().filter(e=>e.date===d);
  const forMonth=(y,m)=>{const p=`${y}-${String(m).padStart(2,'0')}`;return rd().filter(e=>e.date?.startsWith(p));};
  const withRem=()=>{const t=new Date();t.setHours(0,0,0,0);return rd().filter(e=>{if(!e.rem||e.rem==='0')return false;const d=Math.ceil((new Date(e.date+'T00:00:00')-t)/864e5);return d>=0&&d<=+e.rem;});};
  const byCat=c=>c&&c!=='all'?rd().filter(e=>e.cat===c):rd();
  const counts=()=>{const a=rd(),r={all:a.length};['event','bill','note','meeting','birthday','task','holiday'].forEach(c=>r[c]=a.filter(e=>e.cat===c).length);return r;};
  return{add,upd,del,byId,forDate,forMonth,withRem,byCat,counts,rd};
})();
// ── Security helpers ─────────────────────────────────────────
// Escapes HTML special chars to prevent XSS in innerHTML
const esc = s => {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
};
// Strips HTML tags and trims — used before storing user input
const strip = s => s ? String(s).replace(/<[^>]*>/g,'').trim() : '';
// Safe number — returns 0 for NaN/empty
const safeNum = n => { const v = parseFloat(n); return isNaN(v) ? 0 : v; };


const CC={event:'#5b8fd4',bill:'#e8633a',note:'#43c59e',meeting:'#d4aa5b',birthday:'#d48b5b',task:'#5bba8f',holiday:'#9b7fd4'};
const CE={event:'📅',bill:'💸',note:'📝',meeting:'🤝',birthday:'🎂',task:'✅',holiday:'🏖️'};
const cc=c=>CC[c]||'#e8633a',ce=c=>CE[c]||'📅';
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const today=()=>new Date().toISOString().slice(0,10);
const fDate=s=>s?new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
let curTab='Calendar',curFlt='all',calY,calM,selDate;
const sm=id=>document.getElementById(id).classList.remove('hi');
const hm=id=>document.getElementById(id).classList.add('hi');

  document.getElementById('cdt').textContent=n.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
}
setInterval(tickClk,1000);tickClk();

function renderTicker(){
  const td=today(),tm=new Date();tm.setDate(tm.getDate()+1);const tmS=tm.toISOString().slice(0,10);
  const te=DB.forDate(td),tme=DB.forDate(tmS);
  let p=te.map(e=>`${ce(e.cat)} ${e.time?e.time+' ':''}${e.title}`);
  if(tme.length){p.push('│ Tomorrow');tme.forEach(e=>p.push(`${ce(e.cat)} ${e.title}`));}
  if(!p.length)p=['Nothing today — clear skies ✨'];
  document.getElementById('tkrtxt').textContent=p.join('   ·   ');
  setTimeout(renderTicker,60000);

function updateMeta(){
  const all=DB.rd(),td=today();
  const mo=all.filter(e=>e.date?.slice(0,7)===td.slice(0,7)).length;
  const rc=DB.withRem().length;
  document.getElementById('asub').textContent=`${mo} this month · ${rc} reminder${rc!==1?'s':''}`;
  const c=DB.counts();Object.keys(c).forEach(k=>{const el=document.getElementById('cc-'+k);if(el)el.textContent=c[k];});
}

// Calendar layout constants (match CSS exactly)
const CALHDR_H=40,WDAYS_H=20,GRID_PAD=6,DNW_H=24,PILL_H=13;

function renderCal(){
  document.getElementById('calLbl').textContent=`${MN[calM-1]} ${calY}`;
  const grid=document.getElementById('cg');grid.innerHTML='';
  const td=today();
  const evMap={};
  DB.forMonth(calY,calM).forEach(e=>{if(curFlt!=='all'&&e.cat!==curFlt)return;(evMap[e.date]=evMap[e.date]||[]).push(e);});
  const first=new Date(calY,calM-1,1).getDay();
  const dim=new Date(calY,calM,0).getDate();
  const diPrev=new Date(calY,calM-1,0).getDate();
  const rows=Math.ceil((first+dim)/7);

  // CSS grid-auto-rows:1fr handles row heights automatically.
  // We only need to compute how many event pills fit per cell.
  // Estimate available cell height from the grid's rendered height.
  const gridEl=grid.getBoundingClientRect();
  const cellH=gridEl.height>0 ? Math.floor((gridEl.height-(rows-1)*3)/rows) : 70;
  const DNW=26, PILL=15;
  const maxPills=Math.max(0,Math.floor((cellH-DNW)/PILL));

  for(let i=0,total=rows*7;i<total;i++){
    let day,mo=calM,yr=calY,oth=false;
    if(i<first){day=diPrev-first+i+1;mo=calM-1;oth=true;if(mo<1){mo=12;yr--;}}
    else if(i>=first+dim){day=i-first-dim+1;mo=calM+1;oth=true;if(mo>12){mo=1;yr++;}}
    else day=i-first+1;
    const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const evs=evMap[ds]||[];
    const cell=document.createElement('div');
    cell.className='cday'+(oth?' oth':'')+(ds===td?' tod':'')+(ds===selDate?' sel':'');
    const nw=document.createElement('div');nw.className='dnw';
    const dn=document.createElement('div');dn.className='dnum';dn.textContent=day;
    nw.appendChild(dn);cell.appendChild(nw);
    if(evs.length){
      const box=document.createElement('div');box.className='dpills';
      if(maxPills>0){
        const show=Math.min(evs.length,maxPills);
        evs.slice(0,show).forEach(ev=>{const p=document.createElement('div');p.className='dpill';p.style.cssText=`background:${cc(ev.cat)}22;color:${cc(ev.cat)};border-left:2px solid ${cc(ev.cat)}`;p.textContent=(ev.time?ev.time.slice(0,5)+' ':'')+ev.title;box.appendChild(p);});
        if(evs.length>show){const m=document.createElement('div');m.className='dpmore';m.textContent=`+${evs.length-show} more`;box.appendChild(m);}
      } else {
        const dots=document.createElement('div');dots.style.cssText='display:flex;gap:2px;padding:1px 3px;justify-content:center;flex-wrap:wrap;';
        evs.slice(0,5).forEach(ev=>{const d=document.createElement('div');d.style.cssText=`width:5px;height:5px;border-radius:50%;background:${cc(ev.cat)};flex-shrink:0`;dots.appendChild(d);});
        box.appendChild(dots);
      }
      cell.appendChild(box);
    }
    cell.addEventListener('click',()=>{document.querySelectorAll('.cday.sel').forEach(c=>c.classList.remove('sel'));cell.classList.add('sel');selDate=ds;renderDP(ds);});
    grid.appendChild(cell);
  }
}

function renderDP(ds){
  const td=today();
  document.getElementById('dpTitle').textContent=ds===td?"Today's Events":new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let evs=DB.forDate(ds);if(curFlt!=='all')evs=evs.filter(e=>e.cat===curFlt);
  evs.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  const list=document.getElementById('dpList');list.innerHTML='';
  if(!evs.length){list.innerHTML='<div class="dpempty">No events — tap + to add</div>';return;}
  evs.forEach(ev=>{const el=document.createElement('div');el.className='dpitem';el.style.borderLeftColor=cc(ev.cat);el.innerHTML=`<span class="dptime">${esc(ev.time)||'·'}</span><span class="dpname">${ce(ev.cat)} ${esc(ev.title)}</span><div class="dpacts"><button class="ibtn" onclick="editEv('${ev.id}');event.stopPropagation()">✎</button><button class="ibtn d" onclick="delEv('${ev.id}');event.stopPropagation()">✕</button></div>`;list.appendChild(el);});
}

function renderAgenda(){
  const el=document.getElementById('agList');
  let evs=DB.byCat(curFlt).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  const td=today(),tm=new Date();tm.setDate(tm.getDate()+1);const tmS=tm.toISOString().slice(0,10);
  const grps={};evs.forEach(e=>(grps[e.date]=grps[e.date]||[]).push(e));
  el.innerHTML='';
  if(!Object.keys(grps).length){el.innerHTML='<div class="empty"><div class="empty-ic">☰</div>No events yet</div>';return;}
  Object.keys(grps).sort().forEach(ds=>{
    const g=document.createElement('div');g.className='aggrp';
    let lbl=new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    if(ds===td)lbl='📌 Today';else if(ds===tmS)lbl='⏩ Tomorrow';
    g.innerHTML=`<div class="aglbl">${esc(lbl)}</div>`;
    grps[ds].forEach(ev=>{const it=document.createElement('div');it.className='agitem';it.innerHTML=`<div class="agbar" style="background:${cc(ev.cat)}"></div><div class="aginfo"><div class="agttl">${ce(ev.cat)} ${esc(ev.title)}</div><div class="agmet">${ev.time?`<span>⏰ ${esc(ev.time)}</span>`:''}${ev.loc?`<span>📍 ${esc(ev.loc)}</span>`:''}${ev.rep&&ev.rep!=='none'?`<span>🔁 ${esc(ev.rep)}</span>`:''}${ev.amt?`<span>₹${esc(safeNum(ev.amt).toLocaleString('en-IN'))}</span>`:''}</div></div><div class="agacts"><button class="ibtn" onclick="editEv('${ev.id}')">✎</button><button class="ibtn d" onclick="delEv('${ev.id}')">✕</button></div>`;g.appendChild(it);});
    el.appendChild(g);
  });
}

function renderNotes(){
  const el=document.getElementById('nList');const evs=DB.byCat('note').sort((a,b)=>(b.ca||'').localeCompare(a.ca||''));
  el.innerHTML='';
  if(!evs.length){el.innerHTML='<div class="empty" style="grid-column:span 2"><div class="empty-ic">📝</div>No notes yet</div>';return;}
  evs.forEach(ev=>{const c=document.createElement('div');c.className='ncard';c.style.borderTop=`3px solid ${cc('note')}`;c.innerHTML=`<div class="ncard-t">${esc(ev.title)}</div>${ev.notes?`<div class="ncard-b">${esc(ev.notes)}</div>`:''}<div class="ncard-f"><span>${ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</span><div style="display:flex;gap:3px"><button class="ibtn" style="width:22px;height:22px" onclick="editEv('${ev.id}')">✎</button><button class="ibtn d" style="width:22px;height:22px" onclick="delEv('${ev.id}')">✕</button></div></div>`;el.appendChild(c);});
}

function renderReminders(){
  const el=document.getElementById('remList');const now=new Date();now.setHours(0,0,0,0);
  const evs=DB.rd().filter(e=>e.rem&&e.rem!=='0').sort((a,b)=>a.date.localeCompare(b.date));
  el.innerHTML='';
  if(!evs.length){el.innerHTML='<div class="empty"><div class="empty-ic">🔔</div>No reminders set</div>';return;}
  evs.forEach(ev=>{const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5);const dlbl=diff<0?`${Math.abs(diff)}d ago`:diff===0?'Today!':diff===1?'Tomorrow':`in ${diff}d`;const uc=diff>=0&&diff<=+ev.rem?'var(--yel)':'var(--tx3)';const c=document.createElement('div');c.className='lcard';c.innerHTML=`<div class="licon" style="background:${cc(ev.cat)}22">${ce(ev.cat)}</div><div class="linfo"><div class="lttl">${esc(ev.title)}</div><div class="lsub">${esc(fDate(ev.date))} · ${esc(ev.rem)}d reminder</div></div><div class="lright"><span class="lurge" style="color:${uc}">${esc(dlbl)}</span><div style="display:flex;gap:4px"><button class="ibtn" onclick="editEv('${ev.id}')">✎</button><button class="ibtn d" onclick="delEv('${ev.id}')">✕</button></div></div>`;el.appendChild(c);});
}

function renderBills(){
  const el=document.getElementById('bList');const now=new Date();now.setHours(0,0,0,0);
  const bills=DB.byCat('bill').sort((a,b)=>a.date.localeCompare(b.date));const td=today();
  const mo=bills.filter(b=>b.date?.slice(0,7)===td.slice(0,7)).reduce((s,b)=>s+safeNum(b.amt),0);
  const up=bills.filter(b=>new Date(b.date+'T00:00:00')>=now).reduce((s,b)=>s+safeNum(b.amt),0);
  document.getElementById('bMonth').textContent='₹'+mo.toLocaleString('en-IN');
  document.getElementById('bUp').textContent='₹'+up.toLocaleString('en-IN');
  el.innerHTML='';
  if(!bills.length){el.innerHTML='<div class="empty"><div class="empty-ic">💸</div>No bills yet</div>';return;}
  bills.forEach(ev=>{const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5);const past=diff<0;const c=document.createElement('div');c.className='lcard';c.style.opacity=past?'.5':'1';c.innerHTML=`<div class="licon" style="background:rgba(232,99,58,.15)">💸</div><div class="linfo"><div class="lttl">${esc(ev.title)}</div><div class="lsub">${esc(fDate(ev.date))}${ev.rep&&ev.rep!=='none'?' · 🔁 '+esc(ev.rep):''}${past?' · <span style="color:var(--red)">Overdue</span>':''}</div></div><div class="lright">${ev.amt?`<div class="bamt">₹${esc(safeNum(ev.amt).toLocaleString('en-IN'))}</div>`:''}${!past&&diff<=7?`<span class="lurge">Due in ${diff}d</span>`:''}<div style="display:flex;gap:4px"><button class="ibtn" onclick="editEv('${ev.id}')">✎</button><button class="ibtn d" onclick="delEv('${ev.id}')">✕</button></div></div>`;el.appendChild(c);});
}

function exportCSV(){
  const hd=['Title','Date','Time','Category','Location','Amount','Reminder','Repeat','Notes','Created'];
  const rows=DB.rd().map(e=>[`"${(e.title||'').replace(/"/g,'""')}"`,e.date||'',e.time||'',e.cat||'',`"${(e.loc||'').replace(/"/g,'""')}"`,e.amt||'',e.rem||'',e.rep||'',`"${(e.notes||'').replace(/"/g,'""')}"`,e.ca||''].join(','));
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([[hd.join(','),...rows].join('\n')],{type:'text/csv'})),download:`PlannerS_${today()}.csv`});a.click();
}

function openEv(cat){

function editEv(id){
  const ev=DB.byId(id);if(!ev)return;
  document.getElementById('eid').value=ev.id;document.getElementById('mt').textContent='Edit Event';document.getElementById('mi').textContent='✎';
  document.getElementById('et').value=ev.title||'';document.getElementById('ed').value=ev.date||'';document.getElementById('etm').value=ev.time||'';
  document.getElementById('ec').value=ev.cat||'event';document.getElementById('el').value=ev.loc||'';document.getElementById('er').value=ev.rem||'0';
  document.getElementById('erp').value=ev.rep||'none';document.getElementById('ea').value=ev.amt||'';document.getElementById('en').value=ev.notes||'';
  sm('eModal');
}
function saveEv(){
  const rawTitle = strip(document.getElementById('et').value);
  const date     = document.getElementById('ed').value;
  if(!rawTitle){ alert('Title required'); return; }
  if(!date)    { alert('Date required');  return; }
  const parsedDate = new Date(date + 'T00:00:00');
  if(isNaN(parsedDate.getTime())){ alert('Invalid date'); return; }
  const ev={
    title: rawTitle,
    date,
    time:  document.getElementById('etm').value.slice(0,5),
    cat:   document.getElementById('ec').value,
    loc:   strip(document.getElementById('el').value),
    rem:   document.getElementById('er').value,
    rep:   document.getElementById('erp').value,
    amt:   String(safeNum(document.getElementById('ea').value)),
    notes: strip(document.getElementById('en').value)
  };
  const id=document.getElementById('eid').value;
  if(id)DB.upd(id,ev);else DB.add(ev);
  hm('eModal');refreshAll();
}
function delEv(id){if(!confirm('Delete this event?'))return;DB.del(id);refreshAll();}

function checkReminders(){
  const evs=DB.withRem();if(!evs.length)return;
  const now=new Date();now.setHours(0,0,0,0);
  const list=document.getElementById('rList');list.innerHTML='';
  evs.forEach(ev=>{const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5);const it=document.createElement('div');it.className='ri';it.innerHTML=`<span style="font-size:18px">${ce(ev.cat)}</span><span class="rit">${esc(ev.title)}</span><span class="rid">${diff===0?'Today!':diff===1?'Tomorrow':`in ${diff}d`}</span>`;list.appendChild(it);});
  sm('rModal');
}

function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab'+tab).classList.add('on');
  document.getElementById('fltRow').style.display=(tab==='Calendar'||tab==='Agenda')?'flex':'none';
  if(tab==='Agenda')renderAgenda();
  else if(tab==='Notes')renderNotes();
  else if(tab==='Reminders')renderReminders();
  else if(tab==='Bills')renderBills();
  else if(tab==='Calendar'){renderCal();renderDP(selDate);}
}

function refreshAll(){
  updateMeta();renderTicker();renderCal();renderDP(selDate);
  if(curTab==='Agenda')renderAgenda();
  else if(curTab==='Notes')renderNotes();
  else if(curTab==='Reminders')renderReminders();
  else if(curTab==='Bills')renderBills();
}

function seed(){}


// ═══ NOTIFICATIONS ═══
async function enableNotifications(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  if(Notification.permission!=='denied'){
    const p=await Notification.requestPermission();
    return p==='granted';
  }
  return false;
}
function fireReminderNotifications(){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  const today=new Date(); today.setHours(0,0,0,0);
  const key='ps_notified_'+today.toISOString().slice(0,10);
  if(localStorage.getItem(key)) return; // only once per day
  const due=DB.withRem();
  if(!due.length) return;
  due.forEach(ev=>{
    const diff=Math.ceil((new Date(ev.date+'T00:00:00')-today)/864e5);
    const when=diff===0?'today':diff===1?'tomorrow':`in ${diff} days`;
    try{
      new Notification('Planner S — '+esc(ev.title),{
        body:`${ce(ev.cat)} ${ev.title} is due ${when}`,
        icon:'icon.svg',
        tag:'ps-'+ev.id
      });
    }catch(e){}
  });
  localStorage.setItem(key,'1');
}

(function init(){
  if(!localStorage.getItem('ps_cleared_demo')){
    localStorage.removeItem('ps_v5');
    localStorage.removeItem('ps_v6');
    localStorage.setItem('ps_cleared_demo','1');
  }
  const now=new Date();calY=now.getFullYear();calM=now.getMonth()+1;selDate=today();
  seed();updateMeta();renderTicker();
  requestAnimationFrame(()=>{renderCal();renderDP(selDate);requestAnimationFrame(()=>renderCal());});
  document.querySelectorAll('.nbtn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  document.getElementById('prev').addEventListener('click',()=>{calM--;if(calM<1){calM=12;calY--;}renderCal();});
  document.getElementById('next').addEventListener('click',()=>{calM++;if(calM>12){calM=1;calY++;}renderCal();});
  document.getElementById('todayBtn').addEventListener('click',()=>{const n=new Date();calY=n.getFullYear();calM=n.getMonth()+1;selDate=today();renderCal();renderDP(selDate);});
  document.querySelectorAll('.chip').forEach(chip=>{chip.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));chip.classList.add('on');curFlt=chip.dataset.f;renderCal();renderDP(selDate);if(curTab==='Agenda')renderAgenda();});});
  let _rsT;
  const _relayout=()=>{clearTimeout(_rsT);_rsT=setTimeout(()=>{renderCal();renderDP(selDate);},120);};
  window.addEventListener('resize',_relayout);
  window.addEventListener('orientationchange',_relayout);
  // Safari fires this when the address bar shows/hides on scroll
  if(window.visualViewport){window.visualViewport.addEventListener('resize',_relayout);}
  setTimeout(checkReminders,700);
  enableNotifications().then(ok=>{if(ok)fireReminderNotifications();});

})();
</script>
