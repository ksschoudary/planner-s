<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Planner S"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#100b07"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg" type="image/svg+xml"/>
<title>Planner S</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none}

/* ── TOKENS ── */
:root{
  --bg:#100b07; --bg2:#231710; --bg3:#2c1e13;
  --sur:rgba(255,255,255,.055); --sur2:rgba(255,255,255,.09);
  --bdr:rgba(255,255,255,.10);  --bdr2:rgba(255,255,255,.17);
  --tx:#f5ede6; --tx2:rgba(245,237,230,.60); --tx3:rgba(245,237,230,.32);
  --ac:#e8633a; --ac2:rgba(232,99,58,.16);   --ac3:rgba(232,99,58,.28);
  --grn:#5bba8f; --yel:#d4aa5b; --red:#d45b5b;
  --r:13px; --rsm:9px;
  --ff:'Playfair Display',Georgia,serif;
  --fb:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  /* iPhone safe areas — resolved at runtime */
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}

/* ── BASE ── */
html{ height:100%; overflow:hidden; }
body{
  height:100%; overflow:hidden;
  font-family:var(--fb); font-size:14px; color:var(--tx);
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 130% 50% at 50% -8%,rgba(232,99,58,.17) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 95% 90%,rgba(91,143,212,.07) 0%,transparent 55%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  user-select:none;
}

/*
  APP SHELL — pinned to the full physical screen.
  padding-top/bottom absorb the notch & home bar.
  We deliberately do NOT add left/right padding here;
  safe-area-inset-left/right are 0 in portrait on all iPhones.
*/
#app{
  /* position:fixed + inset:0 = exact screen edges, zero overflow.
     Safe areas handled per-element:
       - .hdr gets padding-top for the notch
       - .bnav gets padding-bottom for the home indicator
     DO NOT add padding here — it would double-count the safe areas. */
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* ── HEADER ─────────────────────────────── */
/* Strict fixed height — two rows, clock + title */
.hdr{
  /* height includes safe-area-inset-top so notch is absorbed here */
  flex:0 0 auto;
  min-height:72px;
  padding:8px 16px 6px;
  padding-top:max(8px, calc(var(--sat) + 4px));
  display:flex; flex-direction:column; justify-content:space-between;
  overflow:hidden;
}
.hdr-r1{ display:flex; align-items:center; justify-content:space-between; }
.clkpill{
  display:flex; align-items:center; gap:7px;
  background:var(--sur); border:1px solid var(--bdr);
  border-radius:18px; padding:4px 12px 4px 8px;
}
.dot{
  width:7px; height:7px; border-radius:50%;
  background:var(--ac); flex-shrink:0;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{ box-shadow:0 0 0 0 rgba(232,99,58,.55) }
  50%     { box-shadow:0 0 0 5px rgba(232,99,58,0) }
}
.clkt{ font-size:14px; font-weight:700; letter-spacing:.5px; }
.clksep{ color:var(--tx3); font-size:11px; }
.clkd{ font-size:11px; color:var(--tx2); }
.addbtn{
  width:38px; height:38px; border-radius:11px;
  background:var(--ac); border:none; color:#fff;
  font-size:26px; line-height:1;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 3px 14px rgba(232,99,58,.45);
}
.addbtn:active{ transform:scale(.88); }
.hdr-r2{ display:flex; align-items:baseline; gap:9px; }
.apptitle{ font-family:var(--ff); font-size:26px; font-weight:900; letter-spacing:-.5px; line-height:1; }
.appsub{ font-size:10px; color:var(--tx3); }

/* ── TICKER ─────────────────────────────── */
.tkr{
  flex:0 0 26px; height:26px; min-height:26px; max-height:26px;
  display:flex; align-items:center; gap:8px; padding:0 12px;
  background:rgba(232,99,58,.07);
  border-top:1px solid rgba(232,99,58,.12);
  border-bottom:1px solid rgba(232,99,58,.12);
  overflow:hidden;
}
.tkrlbl{
  font-size:8px; font-weight:700; letter-spacing:1.5px;
  color:var(--ac); background:var(--ac2); border-radius:4px;
  padding:2px 6px; white-space:nowrap; flex-shrink:0;
}
.tkrtrack{ flex:1; overflow:hidden; }
.tkrtxt{
  display:inline-block; white-space:nowrap;
  font-size:11px; color:var(--tx2);
  padding-left:100%;
  animation:marquee 30s linear infinite;
}
@keyframes marquee{ from{transform:translateX(0)} to{transform:translateX(-100%)} }

/* ── FILTER CHIPS ─────────────────────── */
.flt{
  flex:0 0 38px; height:38px; min-height:38px; max-height:38px;
  display:flex; align-items:center; gap:6px;
  padding:0 12px; overflow-x:auto; scrollbar-width:none;
}
.flt::-webkit-scrollbar{ display:none }
.chip{
  display:flex; align-items:center; gap:5px;
  padding:4px 11px; border-radius:16px;
  border:1px solid var(--bdr); background:transparent;
  color:var(--tx2); font-size:11px; font-weight:500;
  cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all .15s;
}
.chip.on{ background:var(--ac); border-color:var(--ac); color:#fff; font-weight:600;
  box-shadow:0 2px 8px rgba(232,99,58,.4); }
.cc{ background:rgba(0,0,0,.2); border-radius:7px;
  padding:1px 5px; font-size:9px; font-weight:700; min-width:15px; text-align:center; }
.chip:not(.on) .cc{ background:var(--sur2); }

/* ── MAIN (fills all remaining space) ── */
main{ flex:1 1 0; min-height:0; overflow:hidden; position:relative; }
.tab{ position:absolute; inset:0; display:none; flex-direction:column; overflow:hidden; }
.tab.on{ display:flex; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CALENDAR TAB
   The entire layout is driven by one JS
   measurement: main.offsetHeight.
   Everything is fixed-pixel, nothing
   is allowed to grow from content.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.calwrap{
  flex:1; min-height:0;
  display:flex; flex-direction:column;
  padding:5px 8px 5px;
  gap:5px;
  overflow:hidden;
}

/*
  .calcard height is set ENTIRELY by JS.
  overflow:hidden is the single rule that
  prevents child content from inflating it.
  DO NOT use contain:size — it breaks
  getBoundingClientRect measurements.
*/
.calcard{
  /* flex-basis overridden by JS inline style */
  flex:0 0 auto;
  background:var(--sur); border:1px solid var(--bdr);
  border-radius:var(--r);
  overflow:hidden;   /* pills CANNOT escape this boundary */
}

/* Fixed-height internal chrome of the card */
.calhdr{
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 12px 4px;
  height:40px; min-height:40px; max-height:40px; /* constant */
}
.calmonth{ font-family:var(--ff); font-size:17px; font-weight:700; }
.calnav{ display:flex; align-items:center; gap:5px; }
.tbtn{
  font-size:10px; font-weight:600; color:var(--ac);
  background:var(--ac2); border:1px solid var(--ac3);
  border-radius:12px; padding:3px 9px; cursor:pointer;
}
.arr{
  width:27px; height:27px; border-radius:50%;
  background:var(--sur2); border:1px solid var(--bdr);
  color:var(--tx2); font-size:15px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.arr:active{ background:var(--bdr2); }

/* Weekday row: fixed height */
.wdays{
  display:grid; grid-template-columns:repeat(7,1fr);
  height:20px; min-height:20px; max-height:20px; /* constant */
  padding:0 4px;
}
.wdays span{
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:600; letter-spacing:.7px;
  color:var(--tx3); text-transform:uppercase;
}

/*
  THE GRID:
  - grid-template-rows is set by JS to "repeat(N, Xpx)"
    where X = exact pixel height per row
  - Each .cday gets overflow:hidden so its content
    (pills) physically cannot push the row taller
  - gap and padding are accounted for in the JS math
*/
.calgrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  /* grid-template-rows: set by JS */
  gap:2px;
  padding:0 4px 6px;
}
.cday{
  overflow:hidden;          /* THE critical rule */
  border-radius:5px;
  display:flex; flex-direction:column; align-items:stretch;
  cursor:pointer;
  transition:background .1s;
  /* Do NOT set height here — grid row defines it */
}
.cday:active{ background:var(--sur2); }
.cday.oth{ opacity:.25; }
.cday.tod{ background:var(--ac2); }
.cday.sel{ background:rgba(232,99,58,.2); outline:1.5px solid var(--ac3); outline-offset:-1px; }

/* Date number — constant height */
.dnw{
  display:flex; justify-content:center;
  padding-top:3px; flex-shrink:0;
  height:24px; min-height:24px; /* constant */
}
.dnum{
  width:20px; height:20px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:500; color:var(--tx2); line-height:1;
}
.cday.tod .dnum{ background:var(--ac); color:#fff; font-weight:700; }
.cday.sel:not(.tod) .dnum{ color:var(--ac); font-weight:600; }

/* Pills container — flex:1 takes remaining row height, overflow:hidden clips */
.dpills{
  flex:1; min-height:0;
  display:flex; flex-direction:column;
  gap:1px; padding:0 2px 2px;
  overflow:hidden; /* clips pills to exact remaining space */
}
.dpill{
  flex-shrink:0;
  font-size:7px; font-weight:600;
  padding:1px 3px; border-radius:3px;
  overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  line-height:1.35;
}
.dpmore{
  flex-shrink:0;
  font-size:7px; color:var(--tx3); padding:0 3px; line-height:1.3;
}

/* ── DAY PREVIEW PANEL ──
   flex:1 takes all remaining height after calcard
*/
.dayprev{
  flex:1; min-height:0;
  background:var(--sur); border:1px solid var(--bdr);
  border-radius:var(--r);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.dphdr{
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 12px 6px; border-bottom:1px solid var(--bdr); flex-shrink:0;
}
.dptitle{ font-size:12px; font-weight:600; }
.dpadd{
  font-size:10px; color:var(--ac); font-weight:600;
  background:var(--ac2); border:1px solid var(--ac3);
  border-radius:10px; padding:3px 9px; cursor:pointer;
}
.dplist{
  flex:1; overflow-y:auto; padding:5px 8px;
  display:flex; flex-direction:column; gap:4px;
  scrollbar-width:none;
}
.dplist::-webkit-scrollbar{ display:none }
.dpitem{
  display:flex; align-items:center; gap:8px;
  padding:6px 9px; border-radius:8px;
  background:var(--sur2); border-left:3px solid var(--ac);
  flex-shrink:0;
}
.dptime{ font-size:9px; color:var(--tx3); min-width:30px; font-weight:500; }
.dpname{ flex:1; font-size:11.5px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.dpacts{ display:flex; gap:3px; flex-shrink:0; }
.ibtn{
  width:24px; height:24px; border-radius:6px;
  border:1px solid var(--bdr); background:transparent;
  color:var(--tx3); font-size:11px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.ibtn:active{ background:var(--sur2); color:var(--tx); }
.ibtn.d:active{ border-color:var(--red); color:var(--red); }
.dpempty{ text-align:center; padding:14px; color:var(--tx3); font-size:11px; font-style:italic; }

/* ── OTHER TABS ─────────────────────── */
.tabttl{
  font-family:var(--ff); font-size:21px; font-weight:700;
  padding:9px 14px 5px; flex-shrink:0;
}
.slist{
  flex:1; overflow-y:auto; padding:0 10px 8px;
  scrollbar-width:thin; scrollbar-color:var(--bdr) transparent;
}
.aggrp{ margin-bottom:11px; }
.aglbl{ font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--ac); padding:0 2px 4px; }
.agitem{
  display:flex; align-items:center; gap:9px;
  padding:9px 11px; border-radius:var(--rsm);
  background:var(--sur); border:1px solid var(--bdr);
  margin-bottom:4px; cursor:pointer;
}
.agitem:active{ background:var(--sur2); }
.agbar{ width:3px; height:30px; border-radius:3px; flex-shrink:0; }
.aginfo{ flex:1; min-width:0; }
.agttl{ font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.agmet{ font-size:10px; color:var(--tx3); display:flex; gap:7px; margin-top:2px; flex-wrap:wrap; }
.agacts{ display:flex; gap:4px; flex-shrink:0; }
.ngrid{
  flex:1; overflow-y:auto; padding:0 10px 8px;
  display:grid; grid-template-columns:1fr 1fr; gap:8px; align-content:start;
}
.ncard{
  background:var(--sur); border:1px solid var(--bdr); border-radius:var(--r);
  padding:11px; display:flex; flex-direction:column; gap:5px; min-height:78px; cursor:pointer;
}
.ncard:active{ background:var(--sur2); }
.ncard-t{ font-size:12.5px; font-weight:600; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.ncard-b{ font-size:10.5px; color:var(--tx2); overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; flex:1; }
.ncard-f{ font-size:9px; color:var(--tx3); display:flex; justify-content:space-between; align-items:center; margin-top:auto; }
.clist{ flex:1; overflow-y:auto; padding:0 10px 8px; display:flex; flex-direction:column; gap:7px; }
.lcard{
  background:var(--sur); border:1px solid var(--bdr); border-radius:var(--r);
  padding:10px 12px; display:flex; align-items:center; gap:10px; cursor:pointer;
}
.lcard:active{ background:var(--sur2); }
.licon{ width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.linfo{ flex:1; min-width:0; }
.lttl{ font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lsub{ font-size:10.5px; color:var(--tx3); margin-top:2px; }
.lright{ display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.lurge{ font-size:10px; font-weight:700; color:var(--yel); }
.bamt{ font-size:14px; font-weight:700; color:var(--ac); font-family:var(--ff); }
.bsum{
  flex-shrink:0; display:flex; align-items:center; gap:14px;
  background:var(--sur); border:1px solid var(--bdr); border-radius:var(--rsm);
  margin:0 10px 7px; padding:8px 12px;
}
.bsuml{ font-size:9px; color:var(--tx3); text-transform:uppercase; letter-spacing:.7px; font-weight:500; }
.bsumv{ font-size:14px; font-weight:700; color:var(--ac); font-family:var(--ff); }
.csvbtn{
  margin-left:auto; padding:5px 10px; border-radius:14px;
  background:rgba(91,186,143,.12); border:1px solid rgba(91,186,143,.28);
  color:var(--grn); font-size:10px; font-weight:600; cursor:pointer;
}
.csvbtn:active{ background:var(--grn); color:#000; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BOTTOM NAV
   Key: height is AUTO, driven by padding.
   padding-bottom:var(--sab) puts content
   above the home indicator, wastes zero px.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.bnav{
  flex:0 0 auto;
  display:flex; align-items:flex-start;
  /* Base: no bottom padding — standalone mode overrides below */
  padding:5px 0 0;
  background:rgba(16,11,7,.9);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--bdr);
}
/* In browser: use env() for address bar area */
@supports not (display: -webkit-named-image(i)) {
  .bnav{ padding-bottom: env(safe-area-inset-bottom, 0px); }
}
/* In standalone PWA (home screen): fixed 20px above home indicator */
@media (display-mode: standalone) {
  .bnav{ padding-bottom: 20px; }
}
.nbtn{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; background:transparent; border:none;
  color:var(--tx3); cursor:pointer; padding:4px 2px; position:relative;
  transition:color .15s;
  /* Fixed height for the visible button content */
  min-height:44px;
}
.nbtn.on{ color:var(--ac); }
.nbtn.on::before{
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:20px; height:2px; background:var(--ac); border-radius:0 0 3px 3px;
}
.nicon{ font-size:18px; line-height:1; }
.nlbl{ font-size:8px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; }

/* ── MODALS ─────────────────────────── */
.ovl{
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  z-index:300; display:flex; align-items:flex-end; justify-content:center;
  animation:fi .18s ease;
}
.ovl.hi{ display:none; }
@keyframes fi{ from{opacity:0} to{opacity:1} }
.modal{
  width:100%; max-width:480px;
  background:var(--bg2); border:1px solid var(--bdr2);
  border-radius:20px 20px 0 0;
  padding:14px 16px calc(14px + var(--sab));
  display:flex; flex-direction:column; gap:11px;
  max-height:88dvh;
  animation:su .24s cubic-bezier(.34,1.4,.64,1);
}
@keyframes su{ from{transform:translateY(44px);opacity:0} to{transform:none;opacity:1} }
.mhandle{ width:30px; height:3px; background:var(--bdr2); border-radius:3px; margin:0 auto -3px; }
.mhdr{ display:flex; align-items:center; gap:9px; }
.micon{ font-size:19px; }
.mtitle{ font-family:var(--ff); font-size:17px; font-weight:700; flex:1; }
.mclose{
  width:28px; height:28px; border-radius:50%;
  border:1px solid var(--bdr); background:transparent;
  color:var(--tx2); font-size:13px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.mclose:active{ background:rgba(212,91,91,.2); color:var(--red); }
.fscroll{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:9px; scrollbar-width:none; }
.fscroll::-webkit-scrollbar{ display:none }
.fgrp{ display:flex; flex-direction:column; gap:4px; }
.flbl{ font-size:9px; font-weight:700; letter-spacing:.9px; text-transform:uppercase; color:var(--tx3); }
.frow{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.fi{
  background:rgba(255,255,255,.06); border:1px solid var(--bdr);
  border-radius:var(--rsm); color:var(--tx); font-size:14px;
  padding:10px 11px; width:100%; outline:none; transition:border-color .15s;
}
.fi:focus{ border-color:var(--ac); }
.fi option{ background:#231710; }
textarea.fi{ resize:none; min-height:62px; }
.macts{ display:flex; gap:8px; flex-shrink:0; }
.btnp{ flex:1; padding:12px; border-radius:var(--rsm); background:var(--ac); border:none; color:#fff; font-size:14px; font-weight:700; cursor:pointer; }
.btnp:active{ opacity:.82; }
.btns{ padding:12px 16px; border-radius:var(--rsm); background:transparent; border:1px solid var(--bdr); color:var(--tx2); font-size:14px; cursor:pointer; }
.btns:active{ background:var(--sur2); }
.rlist{ display:flex; flex-direction:column; gap:7px; max-height:44dvh; overflow-y:auto; }
.ri{ display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:var(--rsm); background:var(--sur); border-left:3px solid var(--yel); }
.rit{ flex:1; font-size:12.5px; font-weight:500; }
.rid{ font-size:10px; color:var(--yel); font-weight:700; }
.empty{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--tx3); font-size:12px; text-align:center; padding:30px; }
.empty-ic{ font-size:30px; opacity:.35; }
</style>
</head>
<body>

<!-- REMINDER MODAL -->
<div id="rModal" class="ovl hi">
  <div class="modal">

<script>
// ─── DB ───────────────────────────────────────────────────────
const DB=(()=>{
  const K='ps_v5';
  const rd=()=>{try{return JSON.parse(localStorage.getItem(K))||[];}catch{return[];}};
  const wr=a=>localStorage.setItem(K,JSON.stringify(a));
  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
  function step(d,r){
    const n=new Date(d);
    ({daily:()=>n.setDate(n.getDate()+1),weekly:()=>n.setDate(n.getDate()+7),
      monthly:()=>n.setMonth(n.getMonth()+1),quarterly:()=>n.setMonth(n.getMonth()+3),
      yearly:()=>n.setFullYear(n.getFullYear()+1)}[r]||(() =>{}))();
    return n;
  }
  function add(ev){
    const all=rd(); ev.id=uid(); ev.ca=new Date().toISOString(); all.push(ev);
    if(ev.rep&&ev.rep!=='none'){
      const lim=new Date(); lim.setFullYear(lim.getFullYear()+2);
      let cur=new Date(ev.date+'T00:00:00');
      for(let i=0;i<400;i++){cur=step(cur,ev.rep);if(cur>lim)break;
        all.push({...ev,id:uid(),date:cur.toISOString().slice(0,10),pid:ev.id,rc:true});}
    }
    wr(all); return ev;
  }
  const upd=(id,ch)=>wr(rd().map(e=>e.id===id?{...e,...ch}:e));
  const del=id=>wr(rd().filter(e=>e.id!==id));
  const byId=id=>rd().find(e=>e.id===id);
  const forDate=d=>rd().filter(e=>e.date===d);
  const forMonth=(y,m)=>{const p=`${y}-${String(m).padStart(2,'0')}`;return rd().filter(e=>e.date?.startsWith(p));};
  const withRem=()=>{
    const t=new Date();t.setHours(0,0,0,0);
    return rd().filter(e=>{if(!e.rem||e.rem==='0')return false;
      const d=Math.ceil((new Date(e.date+'T00:00:00')-t)/864e5);return d>=0&&d<=+e.rem;});
  };
  const byCat=c=>c&&c!=='all'?rd().filter(e=>e.cat===c):rd();
  const counts=()=>{const a=rd(),r={all:a.length};
    ['event','bill','note','meeting','birthday','task','holiday'].forEach(c=>r[c]=a.filter(e=>e.cat===c).length);
    return r;};
  return{add,upd,del,byId,forDate,forMonth,withRem,byCat,counts,rd};
})();

// ─── CONSTANTS ───────────────────────────────────────────────
const CC={event:'#5b8fd4',bill:'#e8633a',note:'#43c59e',meeting:'#d4aa5b',birthday:'#d48b5b',task:'#5bba8f',holiday:'#9b7fd4'};
const CE={event:'📅',bill:'💸',note:'📝',meeting:'🤝',birthday:'🎂',task:'✅',holiday:'🏖️'};
const cc=c=>CC[c]||'#e8633a', ce=c=>CE[c]||'📅';
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const today=()=>new Date().toISOString().slice(0,10);
const fDate=s=>s?new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';

// ─── STATE ───────────────────────────────────────────────────
let curTab='Calendar', curFlt='all', calY, calM, selDate;

// ─── MODAL ───────────────────────────────────────────────────
const sm=id=>document.getElementById(id).classList.remove('hi');
const hm=id=>document.getElementById(id).classList.add('hi');

// ─── CLOCK ───────────────────────────────────────────────────
function tickClk(){
  const n=new Date();
  document.getElementById('clk').textContent=
    n.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});
  document.getElementById('cdt').textContent=
    n.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
}
setInterval(tickClk,1000); tickClk();

// ─── TICKER ──────────────────────────────────────────────────
function renderTicker(){
  const td=today(), tm=new Date(); tm.setDate(tm.getDate()+1);
  const tmS=tm.toISOString().slice(0,10);
  const te=DB.forDate(td), tme=DB.forDate(tmS);
  let p=te.map(e=>`${ce(e.cat)} ${e.time?e.time+' ':''}${e.title}`);
  if(tme.length){p.push('│ Tomorrow');tme.forEach(e=>p.push(`${ce(e.cat)} ${e.title}`));}
  if(!p.length) p=['Nothing today — clear skies ✨'];
  document.getElementById('tkrtxt').textContent=p.join('   ·   ');
  setTimeout(renderTicker,60000);
}

// ─── META ────────────────────────────────────────────────────
function updateMeta(){
  const all=DB.rd(), td=today();
  const mo=all.filter(e=>e.date?.slice(0,7)===td.slice(0,7)).length;
  const rc=DB.withRem().length;
  document.getElementById('asub').textContent=`${mo} this month · ${rc} reminder${rc!==1?'s':''}`;
  const c=DB.counts();
  Object.keys(c).forEach(k=>{const el=document.getElementById('cc-'+k);if(el)el.textContent=c[k];});
}

// ─── CALENDAR ────────────────────────────────────────────────
/*
  LAYOUT MATH (all values are pixel-exact):

  mainH  = main element's rendered height (measured via offsetHeight)

  Inside .calwrap  (padding: 5px top, 5px bottom, gap: 5px):
    calCardH = mainH - WRAP_TOP - WRAP_GAP - PREV_H - WRAP_BOT
    where:
      WRAP_TOP  = 5   (calwrap padding-top)
      WRAP_GAP  = 5   (gap between card and preview)
      PREV_H    = 110 (day-preview fixed min-height — dphdr 33 + items)
      WRAP_BOT  = 5   (calwrap padding-bottom)

  Inside calcard (height = calCardH):
    CALHDR_H  = 40  (.calhdr fixed height)
    WDAYS_H   = 20  (.wdays fixed height)
    GRID_PAD  = 6   (bottom padding inside .calgrid)
    gridH     = calCardH - CALHDR_H - WDAYS_H - GRID_PAD
    rowH      = floor(gridH / rows)

  Pills per cell:
    DNW_H     = 24  (.dnw fixed height)
    availH    = rowH - DNW_H
    PILL_H    = 13  (each pill incl gap)
    maxPills  = floor(availH / PILL_H)
*/
// Layout constants matching CSS (all in px)
const WRAP_PAD =10;  // calwrap top+bottom padding (5+5)
const WRAP_GAP  =5;  // gap between card and preview
const CALHDR_H  =40; // .calhdr
const WDAYS_H   =20; // .wdays
const GRID_PAD  =6;  // calgrid bottom padding
const DNW_H     =24; // .dnw date number row
const PILL_H    =13; // each pill height incl gap

function renderCal(){
  document.getElementById('calLbl').textContent=`${MN[calM-1]} ${calY}`;
  const grid=document.getElementById('cg'); grid.innerHTML='';
  const td=today();

  // Build event map
  const evMap={};
  DB.forMonth(calY,calM).forEach(e=>{
    if(curFlt!=='all'&&e.cat!==curFlt) return;
    (evMap[e.date]=evMap[e.date]||[]).push(e);
  });

  const first=new Date(calY,calM-1,1).getDay();
  const dim  =new Date(calY,calM,0).getDate();
  const diPrev=new Date(calY,calM-1,0).getDate();
  const rows =Math.ceil((first+dim)/7);

  // ── Measure and lock heights ──────────────────────────────
  // Measure the calwrap container — this is what ACTUALLY exists on screen
  const wrap = document.querySelector('.calwrap');
  const wrapH = wrap ? wrap.getBoundingClientRect().height : 500;

  // Split: card gets 66%, preview gets 34%
  // Subtract padding (10) and gap (5) from total
  const available = wrapH - WRAP_PAD - WRAP_GAP;
  const calCardH  = Math.floor(available * 0.66);
  // Minimum sanity check
  const safeCardH = Math.max(calCardH, rows * 42 + CALHDR_H + WDAYS_H + GRID_PAD);

  const gridH = safeCardH - CALHDR_H - WDAYS_H - GRID_PAD;
  const rowH  = Math.max(Math.floor(gridH / rows), 38);

  // Lock card to exact computed height — overflow:hidden keeps pills inside
  const card = document.getElementById('calCard');
  card.style.height = safeCardH + 'px';

  // Lock every grid row to the same height — this is what prevents cell resizing
  grid.style.gridTemplateRows=`repeat(${rows},${rowH}px)`;

  // Pills that physically fit
  const maxPills=Math.max(0,Math.floor((rowH-DNW_H)/PILL_H));

  // ── Build cells ──────────────────────────────────────────
  for(let i=0,total=rows*7;i<total;i++){
    let day,mo=calM,yr=calY,oth=false;
    if(i<first){
      day=diPrev-first+i+1; mo=calM-1; oth=true;
      if(mo<1){mo=12;yr--;}
    } else if(i>=first+dim){
      day=i-first-dim+1; mo=calM+1; oth=true;
      if(mo>12){mo=1;yr++;}
    } else {
      day=i-first+1;
    }
    const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const evs=evMap[ds]||[];

    const cell=document.createElement('div');
    cell.className='cday'+(oth?' oth':'')+(ds===td?' tod':'')+(ds===selDate?' sel':'');

    // Date number wrapper (fixed height)
    const nw=document.createElement('div'); nw.className='dnw';
    const dn=document.createElement('div'); dn.className='dnum'; dn.textContent=day;
    nw.appendChild(dn); cell.appendChild(nw);

    // Pills — inside overflow:hidden container, cannot push cell taller
    if(evs.length){
      const box=document.createElement('div'); box.className='dpills';
      if(maxPills>0){
        const show=Math.min(evs.length,maxPills);
        evs.slice(0,show).forEach(ev=>{
          const p=document.createElement('div'); p.className='dpill';
          p.style.cssText=`background:${cc(ev.cat)}22;color:${cc(ev.cat)};border-left:2px solid ${cc(ev.cat)}`;
          p.textContent=(ev.time?ev.time.slice(0,5)+' ':'')+ev.title;
          box.appendChild(p);
        });
        if(evs.length>show){
          const m=document.createElement('div'); m.className='dpmore';
          m.textContent=`+${evs.length-show} more`;
          box.appendChild(m);
        }
      } else {
        // Row too short for text pills — show coloured dots
        const dots=document.createElement('div');
        dots.style.cssText='display:flex;gap:2px;padding:1px 3px;flex-wrap:wrap;justify-content:center;';
        evs.slice(0,5).forEach(ev=>{
          const d=document.createElement('div');
          d.style.cssText=`width:5px;height:5px;border-radius:50%;background:${cc(ev.cat)};flex-shrink:0`;
          dots.appendChild(d);
        });
        box.appendChild(dots);
      }
      cell.appendChild(box);
    }

    cell.addEventListener('click',()=>{
      document.querySelectorAll('.cday.sel').forEach(c=>c.classList.remove('sel'));
      cell.classList.add('sel'); selDate=ds; renderDP(ds);
    });
    grid.appendChild(cell);
  }
}

function renderDP(ds){
  const td=today();
  const ttl=document.getElementById('dpTitle');
  ttl.textContent=ds===td?"Today's Events"
    :new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let evs=DB.forDate(ds);
  if(curFlt!=='all') evs=evs.filter(e=>e.cat===curFlt);
  evs.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  const list=document.getElementById('dpList'); list.innerHTML='';
  if(!evs.length){list.innerHTML='<div class="dpempty">No events — tap + to add</div>';return;}
  evs.forEach(ev=>{
    const el=document.createElement('div'); el.className='dpitem'; el.style.borderLeftColor=cc(ev.cat);
    el.innerHTML=`<span class="dptime">${ev.time||'·'}</span>
      <span class="dpname">${ce(ev.cat)} ${ev.title}</span>
      <div class="dpacts">
        <button class="ibtn" onclick="editEv('${ev.id}');event.stopPropagation()">✎</button>
        <button class="ibtn d" onclick="delEv('${ev.id}');event.stopPropagation()">✕</button>
      </div>`;
    list.appendChild(el);
  });
}

// ─── AGENDA ──────────────────────────────────────────────────
function renderAgenda(){
  const el=document.getElementById('agList');
  let evs=DB.byCat(curFlt).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  const td=today(), tm=new Date(); tm.setDate(tm.getDate()+1); const tmS=tm.toISOString().slice(0,10);
  const grps={}; evs.forEach(e=>(grps[e.date]=grps[e.date]||[]).push(e));
  el.innerHTML='';
  if(!Object.keys(grps).length){el.innerHTML='<div class="empty"><div class="empty-ic">☰</div>No events yet</div>';return;}
  Object.keys(grps).sort().forEach(ds=>{
    const g=document.createElement('div'); g.className='aggrp';
    let lbl=new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    if(ds===td) lbl='📌 Today'; else if(ds===tmS) lbl='⏩ Tomorrow';
    g.innerHTML=`<div class="aglbl">${lbl}</div>`;
    grps[ds].forEach(ev=>{
      const it=document.createElement('div'); it.className='agitem';
      it.innerHTML=`<div class="agbar" style="background:${cc(ev.cat)}"></div>
        <div class="aginfo">
          <div class="agttl">${ce(ev.cat)} ${ev.title}</div>
          <div class="agmet">
            ${ev.time?`<span>⏰ ${ev.time}</span>`:''}
            ${ev.loc?`<span>📍 ${ev.loc}</span>`:''}
            ${ev.rep&&ev.rep!=='none'?`<span>🔁 ${ev.rep}</span>`:''}
            ${ev.amt?`<span>₹${(+ev.amt).toLocaleString('en-IN')}</span>`:''}
          </div>
        </div>
        <div class="agacts">
          <button class="ibtn" onclick="editEv('${ev.id}')">✎</button>
          <button class="ibtn d" onclick="delEv('${ev.id}')">✕</button>
        </div>`;
      g.appendChild(it);
    });
    el.appendChild(g);
  });
}

// ─── NOTES ───────────────────────────────────────────────────
function renderNotes(){
  const el=document.getElementById('nList');
  const evs=DB.byCat('note').sort((a,b)=>(b.ca||'').localeCompare(a.ca||''));
  el.innerHTML='';
  if(!evs.length){el.innerHTML='<div class="empty" style="grid-column:span 2"><div class="empty-ic">📝</div>No notes yet</div>';return;}
  evs.forEach(ev=>{
    const c=document.createElement('div'); c.className='ncard'; c.style.borderTop=`3px solid ${cc('note')}`;
    c.innerHTML=`<div class="ncard-t">${ev.title}</div>
      ${ev.notes?`<div class="ncard-b">${ev.notes}</div>`:''}
      <div class="ncard-f">
        <span>${ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</span>
        <div style="display:flex;gap:3px">
          <button class="ibtn" style="width:22px;height:22px" onclick="editEv('${ev.id}')">✎</button>
          <button class="ibtn d" style="width:22px;height:22px" onclick="delEv('${ev.id}')">✕</button>
        </div>
      </div>`;
    el.appendChild(c);
  });
}

// ─── REMINDERS ───────────────────────────────────────────────
function renderReminders(){
  const el=document.getElementById('remList');
  const now=new Date(); now.setHours(0,0,0,0);
  const evs=DB.rd().filter(e=>e.rem&&e.rem!=='0').sort((a,b)=>a.date.localeCompare(b.date));
  el.innerHTML='';
  if(!evs.length){el.innerHTML='<div class="empty"><div class="empty-ic">🔔</div>No reminders set</div>';return;}
  evs.forEach(ev=>{
    const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5);
    const dlbl=diff<0?`${Math.abs(diff)}d ago`:diff===0?'Today!':diff===1?'Tomorrow':`in ${diff}d`;
    const uc=diff>=0&&diff<=+ev.rem?'var(--yel)':'var(--tx3)';
    const c=document.createElement('div'); c.className='lcard';
    c.innerHTML=`<div class="licon" style="background:${cc(ev.cat)}22">${ce(ev.cat)}</div>
      <div class="linfo"><div class="lttl">${ev.title}</div><div class="lsub">${fDate(ev.date)} · ${ev.rem}d reminder</div></div>
      <div class="lright">
        <span class="lurge" style="color:${uc}">${dlbl}</span>
        <div style="display:flex;gap:4px">
          <button class="ibtn" onclick="editEv('${ev.id}')">✎</button>
          <button class="ibtn d" onclick="delEv('${ev.id}')">✕</button>
        </div>
      </div>`;
    el.appendChild(c);
  });
}

// ─── BILLS ───────────────────────────────────────────────────
function renderBills(){
  const el=document.getElementById('bList');
  const now=new Date(); now.setHours(0,0,0,0);
  const bills=DB.byCat('bill').sort((a,b)=>a.date.localeCompare(b.date));
  const td=today();
  const mo=bills.filter(b=>b.date?.slice(0,7)===td.slice(0,7)).reduce((s,b)=>s+(+b.amt||0),0);
  const up=bills.filter(b=>new Date(b.date+'T00:00:00')>=now).reduce((s,b)=>s+(+b.amt||0),0);
  document.getElementById('bMonth').textContent='₹'+mo.toLocaleString('en-IN');
  document.getElementById('bUp').textContent='₹'+up.toLocaleString('en-IN');
  el.innerHTML='';
  if(!bills.length){el.innerHTML='<div class="empty"><div class="empty-ic">💸</div>No bills yet</div>';return;}
  bills.forEach(ev=>{
    const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5); const past=diff<0;
    const c=document.createElement('div'); c.className='lcard'; c.style.opacity=past?'.5':'1';
    c.innerHTML=`<div class="licon" style="background:rgba(232,99,58,.15)">💸</div>
      <div class="linfo">
        <div class="lttl">${ev.title}</div>
        <div class="lsub">${fDate(ev.date)}${ev.rep&&ev.rep!=='none'?' · 🔁 '+ev.rep:''}${past?' · <span style="color:var(--red)">Overdue</span>':''}</div>
      </div>
      <div class="lright">
        ${ev.amt?`<div class="bamt">₹${(+ev.amt).toLocaleString('en-IN')}</div>`:''}
        ${!past&&diff<=7?`<span class="lurge">Due in ${diff}d</span>`:''}
        <div style="display:flex;gap:4px">
          <button class="ibtn" onclick="editEv('${ev.id}')">✎</button>
          <button class="ibtn d" onclick="delEv('${ev.id}')">✕</button>
        </div>
      </div>`;
    el.appendChild(c);
  });
}

// ─── CSV ─────────────────────────────────────────────────────
function exportCSV(){
  const hd=['Title','Date','Time','Category','Location','Amount','Reminder','Repeat','Notes','Created'];
  const rows=DB.rd().map(e=>[
    `"${(e.title||'').replace(/"/g,'""')}"`,e.date||'',e.time||'',e.cat||'',
    `"${(e.loc||'').replace(/"/g,'""')}"`,e.amt||'',e.rem||'',e.rep||'',
    `"${(e.notes||'').replace(/"/g,'""')}"`,e.ca||''
  ].join(','));
  const a=Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(new Blob([[hd.join(','),...rows].join('\n')],{type:'text/csv'})),
    download:`PlannerS_${today()}.csv`
  });
  a.click();
}

// ─── EVENT MODAL ─────────────────────────────────────────────
function openEv(cat){
  document.getElementById('eid').value='';
  document.getElementById('mt').textContent='New Event';
  document.getElementById('mi').textContent='✦';
  document.getElementById('et').value='';
  document.getElementById('ed').value=today();
  document.getElementById('etm').value='';
  document.getElementById('ec').value=cat||'event';
  document.getElementById('el').value='';
  document.getElementById('er').value='0';
  document.getElementById('erp').value='none';
  document.getElementById('ea').value='';
  document.getElementById('en').value='';
  sm('eModal');
}
function editEv(id){
  const ev=DB.byId(id); if(!ev) return;
  document.getElementById('eid').value=ev.id;
  document.getElementById('mt').textContent='Edit Event';
  document.getElementById('mi').textContent='✎';
  document.getElementById('et').value=ev.title||'';
  document.getElementById('ed').value=ev.date||'';
  document.getElementById('etm').value=ev.time||'';
  document.getElementById('ec').value=ev.cat||'event';
  document.getElementById('el').value=ev.loc||'';
  document.getElementById('er').value=ev.rem||'0';
  document.getElementById('erp').value=ev.rep||'none';
  document.getElementById('ea').value=ev.amt||'';
  document.getElementById('en').value=ev.notes||'';
  sm('eModal');
}
function saveEv(){
  const title=document.getElementById('et').value.trim();
  const date=document.getElementById('ed').value;
  if(!title||!date){alert('Title and date required');return;}
  const ev={title,date,
    time:document.getElementById('etm').value,
    cat:document.getElementById('ec').value,
    loc:document.getElementById('el').value.trim(),
    rem:document.getElementById('er').value,
    rep:document.getElementById('erp').value,
    amt:document.getElementById('ea').value,
    notes:document.getElementById('en').value.trim()
  };
  const id=document.getElementById('eid').value;
  if(id) DB.upd(id,ev); else DB.add(ev);
  hm('eModal'); refreshAll();
}
function delEv(id){ if(!confirm('Delete this event?'))return; DB.del(id); refreshAll(); }

// ─── REMINDER POPUP ──────────────────────────────────────────
function checkReminders(){
  const evs=DB.withRem(); if(!evs.length) return;
  const now=new Date(); now.setHours(0,0,0,0);
  const list=document.getElementById('rList'); list.innerHTML='';
  evs.forEach(ev=>{
    const diff=Math.ceil((new Date(ev.date+'T00:00:00')-now)/864e5);
    const it=document.createElement('div'); it.className='ri';
    it.innerHTML=`<span style="font-size:18px">${ce(ev.cat)}</span>
      <span class="rit">${ev.title}</span>
      <span class="rid">${diff===0?'Today!':diff===1?'Tomorrow':`in ${diff}d`}</span>`;
    list.appendChild(it);
  });
  sm('rModal');
}

// ─── NAVIGATION ──────────────────────────────────────────────
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab'+tab).classList.add('on');
  document.getElementById('fltRow').style.display=
    (tab==='Calendar'||tab==='Agenda')?'flex':'none';
  if(tab==='Agenda')    renderAgenda();
  else if(tab==='Notes')     renderNotes();
  else if(tab==='Reminders') renderReminders();
  else if(tab==='Bills')     renderBills();
  else if(tab==='Calendar')  {renderCal(); renderDP(selDate);}
}

function refreshAll(){
  updateMeta(); renderTicker();
  renderCal(); renderDP(selDate);
  if(curTab==='Agenda')    renderAgenda();
  else if(curTab==='Notes')     renderNotes();
  else if(curTab==='Reminders') renderReminders();
  else if(curTab==='Bills')     renderBills();
}

// ─── SEED ────────────────────────────────────────────────────
function seed(){
  if(localStorage.getItem('ps_seeded_v5')) return;
  const off=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
  [
    {title:'Team Standup',  date:off(0), time:'09:30',cat:'meeting', rem:'1',rep:'daily'},
    {title:'Electricity Bill',date:off(3),            cat:'bill',    amt:'2400',rem:'3',rep:'monthly'},
    {title:'Recipe ideas',  date:off(0),              cat:'note',    notes:'Kerala fish curry — mustard seeds, curry leaves, kokum.'},
    {title:"Mum's Birthday",date:off(5),              cat:'birthday',rem:'7',rep:'yearly'},
    {title:'Dentist',       date:off(2), time:'11:00',cat:'event',   loc:'City Dental Clinic',rem:'2'},
    {title:'Netflix',       date:off(10),             cat:'bill',    amt:'649',rep:'monthly',rem:'3'},
    {title:'Follow up',     date:off(4),              cat:'task'},
    {title:'Coaching',      date:off(5), time:'16:00',cat:'meeting', rep:'weekly'},
    {title:'Ekadashi fast', date:off(13),             cat:'holiday', rem:'5',rep:'monthly'},
    {title:'Interview panel',date:off(6),             cat:'event',   notes:'Prep: backend + system design'},
  ].forEach(e=>DB.add({rep:'none',rem:'0',...e}));
  localStorage.setItem('ps_seeded_v5','1');
}

// ─── INIT ────────────────────────────────────────────────────
(function init(){
  if('serviceWorker'in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

  const now=new Date(); calY=now.getFullYear(); calM=now.getMonth()+1; selDate=today();

  seed(); updateMeta(); renderTicker();

  // Wait two frames: first paints DOM, second gives layout engine
  // correct offsetHeight values after safe-area padding resolves
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    renderCal(); renderDP(selDate);
  }));

  document.querySelectorAll('.nbtn').forEach(b=>
    b.addEventListener('click',()=>switchTab(b.dataset.tab)));

  document.getElementById('prev').addEventListener('click',()=>{
    calM--; if(calM<1){calM=12;calY--;} renderCal();
  });
  document.getElementById('next').addEventListener('click',()=>{
    calM++; if(calM>12){calM=1;calY++;} renderCal();
  });
  document.getElementById('todayBtn').addEventListener('click',()=>{
    const n=new Date(); calY=n.getFullYear(); calM=n.getMonth()+1; selDate=today();
    renderCal(); renderDP(selDate);
  });

  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      chip.classList.add('on'); curFlt=chip.dataset.f;
      renderCal(); renderDP(selDate);
      if(curTab==='Agenda') renderAgenda();
    });
  });

  // Re-measure on orientation change
  window.addEventListener('resize',()=>requestAnimationFrame(renderCal));

  setTimeout(checkReminders,700);
})();
</script>
