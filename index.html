<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Planner S"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Planner S</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- REMINDER POPUP -->
<div id="reminderPopup" class="popup-overlay hidden">
  <div class="popup-card glass">
    <div class="popup-header">
      <span class="popup-icon">🔔</span>
      <h3>Upcoming Reminders</h3>
      <button class="popup-close" onclick="closeReminderPopup()">✕</button>
    </div>
    <div id="reminderList" class="reminder-list"></div>
    <button class="btn-primary" onclick="closeReminderPopup()">Got it</button>
  </div>
</div>

<!-- ADD / EDIT EVENT MODAL -->
<div id="eventModal" class="popup-overlay hidden">
  <div class="popup-card glass modal-large">
    <div class="popup-header">
      <span class="popup-icon">✦</span>
      <h3 id="modalTitle">New Event</h3>
      <button class="popup-close" onclick="closeEventModal()">✕</button>
    </div>
    <div class="form-scroll">
      <input type="hidden" id="editId"/>
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="evTitle" placeholder="Event title…" class="glass-input"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="evDate" class="glass-input"/>
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" id="evTime" class="glass-input"/>
        </div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="evCategory" class="glass-input">
          <option value="event">📅 Event</option>
          <option value="bill">💸 Bill</option>
          <option value="note">📝 Note</option>
          <option value="meeting">🤝 Meeting</option>
          <option value="birthday">🎂 Birthday</option>
          <option value="task">✅ Task</option>
          <option value="holiday">🏖️ Holiday</option>
        </select>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="evLocation" placeholder="Optional location…" class="glass-input"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Reminder</label>
          <select id="evReminder" class="glass-input">
            <option value="0">None</option>
            <option value="1">1 day before</option>
            <option value="2">2 days before</option>
            <option value="3">3 days before</option>
            <option value="5">5 days before</option>
            <option value="7">7 days before</option>
          </select>
        </div>
        <div class="form-group">
          <label>Repeat</label>
          <select id="evRepeat" class="glass-input">
            <option value="none">None</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="quarterly">Quarterly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Amount (for Bills)</label>
        <input type="number" id="evAmount" placeholder="₹ 0.00" class="glass-input"/>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="evNotes" placeholder="Additional notes…" class="glass-input" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeEventModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app">

  <!-- TICKER -->
  <div class="ticker-bar glass">
    <div class="ticker-label">TODAY</div>
    <div class="ticker-track">
      <div class="ticker-content" id="tickerContent">Loading events…</div>
    </div>
  </div>

  <!-- FILTER CHIPS -->
  <div class="filter-row" id="filterRow">
    <button class="chip active" data-filter="all">All</button>
    <button class="chip" data-filter="event">Events</button>
    <button class="chip" data-filter="bill">Bills</button>
    <button class="chip" data-filter="note">Notes</button>
    <button class="chip" data-filter="meeting">Meetings</button>
    <button class="chip" data-filter="birthday">Bdays</button>
    <button class="chip" data-filter="task">Tasks</button>
    <button class="chip" data-filter="holiday">Holidays</button>
  </div>

  <!-- MAIN CONTENT AREA -->
  <main id="mainContent">

    <!-- TAB: CALENDAR -->
    <section id="tabCalendar" class="tab-section active">
      <div class="cal-header">
        <button class="nav-btn" id="prevMonth">‹</button>
        <div class="cal-title-wrap">
          <h2 id="calMonthYear"></h2>
        </div>
        <button class="nav-btn" id="nextMonth">›</button>
      </div>
      <div class="cal-grid-wrap">
        <div class="cal-weekdays">
          <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="day-preview glass" id="dayPreview">
        <div class="day-preview-header">
          <span id="dayPreviewTitle">Today's Events</span>
          <button class="add-mini-btn" onclick="openEventModal()">+ Add</button>
        </div>
        <div class="day-preview-list" id="dayPreviewList"></div>
      </div>
    </section>

    <!-- TAB: AGENDA -->
    <section id="tabAgenda" class="tab-section">
      <div class="section-header">
        <h2>Agenda</h2>
        <button class="add-btn" onclick="openEventModal()">+</button>
      </div>
      <div id="agendaList" class="agenda-list"></div>
    </section>

    <!-- TAB: NOTES -->
    <section id="tabNotes" class="tab-section">
      <div class="section-header">
        <h2>Notes</h2>
        <button class="add-btn" onclick="openEventModal('note')">+</button>
      </div>
      <div id="notesList" class="cards-grid"></div>
    </section>

    <!-- TAB: REMINDERS -->
    <section id="tabReminders" class="tab-section">
      <div class="section-header">
        <h2>Reminders</h2>
        <button class="add-btn" onclick="openEventModal()">+</button>
      </div>
      <div id="remindersList" class="cards-list"></div>
    </section>

    <!-- TAB: BILLS -->
    <section id="tabBills" class="tab-section">
      <div class="section-header">
        <h2>Bills</h2>
        <div class="bills-summary glass" id="billsSummary"></div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
          <button class="add-btn" onclick="openEventModal('bill')">+</button>
        </div>
      </div>
      <div id="billsList" class="cards-list"></div>
    </section>

  </main>

  <!-- FAB -->
  <button class="fab" onclick="openEventModal()" title="Add Event">
    <span>+</span>
  </button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav glass">
    <button class="nav-item active" data-tab="Calendar">
      <span class="nav-icon">⊞</span>
      <span class="nav-label">Main</span>
    </button>
    <button class="nav-item" data-tab="Agenda">
      <span class="nav-icon">☰</span>
      <span class="nav-label">Agenda</span>
    </button>
    <button class="nav-item" data-tab="Notes">
      <span class="nav-icon">✎</span>
      <span class="nav-label">Notes</span>
    </button>
    <button class="nav-item" data-tab="Reminders">
      <span class="nav-icon">🔔</span>
      <span class="nav-label">Reminders</span>
    </button>
    <button class="nav-item" data-tab="Bills">
      <span class="nav-icon">💸</span>
      <span class="nav-label">Bills</span>
    </button>
  </nav>
</div>

<script src="js/db.js"></script>
<script src="js/calendar.js"></script>
<script src="js/agenda.js"></script>
<script src="js/notes.js"></script>
<script src="js/reminders.js"></script>
<script src="js/bills.js"></script>
<script src="js/app.js"></script>
</body>
</html>
